        output_type: array[object]
        parallel_nums: 1
        selected: false
        start_node_id: iter_nodestart0
        title: Iteration — filtered apps only, parallel_nums=2
        type: iteration
      height: 297
      id: iter_node
      position:
        x: 630
        y: 282
      positionAbsolute:
        x: 630
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 412
      zIndex: 1
    - data:
        desc: ''
        isInIteration: true
        selected: false
        title: ''
        type: iteration-start
      draggable: false
      height: 48
      id: iter_nodestart
      parentId: iter_node
      position:
        x: 24
        y: 68
      positionAbsolute:
        x: 654
        y: 350
      selectable: false
      sourcePosition: right
      targetPosition: left
      type: custom-iteration-start
      width: 44
      zIndex: 1002
    - data:
        code: "import httpx\nimport base64\nimport re\nfrom datetime import datetime,\
          \ timezone\n\n# ── UI field stripper ────────────────────────────────────────────\n\
          # Strips canvas-only keys so cosmetic drag/resize never triggers a commit.\n\
          UI_KEYS = {\n    'position', 'positionAbsolute', 'selected', 'zIndex',\n\
          \    'height', 'width', 'sourcePosition', 'targetPosition',\n    'draggable',\
          \ 'selectable', 'viewport',\n}\nUI_PAT = re.compile(\n    r'^(\\s*)(' +\
          \ '|'.join(UI_KEYS) + r')(\\s*:.*)$'\n)\n\ndef normalise_dsl(raw: str) ->\
          \ str:\n    \"\"\"Remove canvas-only UI fields before comparison.\"\"\"\n\
          \    out, skip_indent = [], None\n    for line in raw.splitlines():\n  \
          \      if not line.strip():\n            out.append(line)\n            skip_indent\
          \ = None\n            continue\n        indent = len(line) - len(line.lstrip())\n\
          \        if skip_indent is not None:\n            if indent > skip_indent:\n\
          \                continue\n            skip_indent = None\n        if UI_PAT.match(line):\n\
          \            skip_indent = indent\n            continue\n        out.append(line)\n\
          \    return '\\n'.join(out)\n\n\ndef main(\n    DIFY_ACCESS_TOKEN: str,\
          \ DIFY_HOST: str,\n    GITHUB_TOKEN: str, GITHUB_REPO: str,\n    GITHUB_OWNER:\
          \ str, GITHUB_BRANCH: str,\n    app: dict\n):\n    app_id   = app.get('id',\
          \   '')\n    app_name = app.get('name', 'unknown')\n    host     = (DIFY_HOST\
          \ or '').strip().rstrip('/')\n    now_ts   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')\n\
          \n    # Guard: missing tokens produce 'Illegal header value' — catch early\n\
          \    _tok_d = (DIFY_ACCESS_TOKEN or '').strip()\n    _tok_g = (GITHUB_TOKEN\
          \ or '').strip()\n    if not host or not _tok_d or not _tok_g:\n       \
          \ _m = [v for v,val in [('DIFY_HOST',host),('DIFY_ACCESS_TOKEN',_tok_d),('GITHUB_TOKEN',_tok_g)]\
          \ if not val]\n        return {'result': {'app': app_name, 'status': 'Error',\
          \ 'commit_id': f'Missing env: {\",\".join(_m)}'}}\n\n    clean   = ''.join(\n\
          \        c for c in app_name if c.isalnum() or c in (' ', '_')\n    ).strip().replace('\
          \ ', '_')\n    gh_path = (\n        f'https://api.github.com/repos/{(GITHUB_OWNER\
          \ or \"\").strip()}/{(GITHUB_REPO or \"\").strip()}'\n        f'/contents/dsl/{clean}.yml'\n\
          \    )\n\n    dify_headers   = {'Authorization': f'Bearer {_tok_d}'}\n \
          \   github_headers = {\n        'Authorization':        f'Bearer {_tok_g}',\n\
          \        'Accept':               'application/vnd.github+json',\n      \
          \  'X-GitHub-Api-Version': '2022-11-28',\n    }\n    dify_timeout   = httpx.Timeout(connect=3.0,\
          \ read=10.0, write=5.0,  pool=5.0)\n    github_timeout = httpx.Timeout(connect=10.0,\
          \ read=8.0,  write=8.0,  pool=5.0)\n\n    try:\n        # One client context\
          \ covering all 3 HTTP calls.\n        # Single TLS handshake per app invocation.\n\
          \        with httpx.Client(timeout=dify_timeout) as dify_client, \\\n  \
          \           httpx.Client(timeout=github_timeout, headers=github_headers)\
          \ as gh_client:\n\n            # ── Step 1: Export DSL from Dify ──────────────────────────\n\
          \            dr = dify_client.get(\n                f'{host}/console/api/apps/{app_id}/export',\n\
          \                headers=dify_headers\n            )\n            if dr.status_code\
          \ == 401:\n                return {'result': {\n                    'app':\
          \       app_name,\n                    'status':    'Error',\n         \
          \           'commit_id': 'TOKEN_EXPIRED'\n                }}\n         \
          \   dr.raise_for_status()\n            ct  = dr.headers.get('content-type',\
          \ '')\n            dsl = dr.json().get('data', '') if 'json' in ct else\
          \ dr.text\n\n            # ── Step 2: GitHub GET — fetch existing file ─────────────────\n\
          \            sha      = None\n            get_resp = gh_client.get(gh_path)\n\
          \            if get_resp.status_code == 200:\n                gdata   =\
          \ get_resp.json()\n                sha     = gdata.get('sha')\n        \
          \        raw_b64 = gdata.get('content', '').replace('\\n', '')\n       \
          \         existing = base64.b64decode(raw_b64).decode('utf-8')\n       \
          \         # normalise_dsl is the safety net:\n                # even if\
          \ updated_at triggered a false positive, this prevents\n               \
          \ # committing an identical DSL (only UI fields changed).\n            \
          \    if normalise_dsl(existing) == normalise_dsl(dsl):\n               \
          \     return {'result': {\n                        'app':       app_name,\n\
          \                        'status':    'Skipped',\n                     \
          \   'commit_id': 'N/A'\n                    }}\n            elif get_resp.status_code\
          \ != 404:\n                return {'result': {\n                    'app':\
          \       app_name,\n                    'status':    'Error',\n         \
          \           'commit_id': f'GitHub GET {get_resp.status_code}'\n        \
          \        }}\n\n            # ── Step 3: GitHub PUT — push updated DSL ──────────────────\n\
          \            payload = {\n                'message': f'sync({now_ts}): {app_name}',\n\
          \                'content': base64.b64encode(\n                    dsl.encode('utf-8')\n\
          \                ).decode('utf-8'),\n                'branch': GITHUB_BRANCH,\n\
          \            }\n            if sha:\n                payload['sha'] = sha\
          \   # required for updates; omit for new files\n            put_resp = gh_client.put(gh_path,\
          \ json=payload)\n            put_resp.raise_for_status()\n            commit_sha\
          \ = put_resp.json().get('commit', {}).get('sha', 'unknown')[:7]\n      \
          \      return {'result': {\n                'app':       app_name,\n   \
          \             'status':    'Success',\n                'commit_id': commit_sha\n\
          \            }}\n\n    except httpx.TimeoutException as exc:\n        where\
          \ = 'Dify' if host in str(getattr(exc, 'request', '')) else 'GitHub'\n \
          \       return {'result': {\n            'app':       app_name,\n      \
          \      'status':    'Error',\n            'commit_id': f'{where} timeout'\n\
          \        }}\n    except Exception as exc:\n        return {'result': {\n\
          \            'app':       app_name,\n            'status':    'Error',\n\
          \            'commit_id': f'Error: {str(exc)[:80]}'\n        }}\n"
        code_language: python3
        desc: 'One invocation per filtered app — own 120s sandbox. Single httpx.Client
          for all 3 calls (one TLS handshake). Split timeouts: Dify connect=3s/ read=10s,
          GitHub connect=5s/read=8s/write=8s. normalise_dsl() catches false positives
          from updated_at filter — only real DSL changes commit. Returns result={app,
          status, commit_id}.'
        isInIteration: true
        isInLoop: false
        iteration_id: iter_node
        outputs:
          result:
            children: null
            type: object
        selected: false
