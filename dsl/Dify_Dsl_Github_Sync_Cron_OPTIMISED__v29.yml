app:
  description: 'Exports Dify DSLs on every cron run. Filters by updated_at via .sync_state.
    v29: env var declarations for tokens restored to value_type=secret (so Dify injects
    token values at runtime); code-node bindings remain value_type=string (so Dify
    passes the values instead of masking them). Both are required together.'
  icon: 🕐
  icon_background: '#E0F2FE'
  mode: workflow
  name: Dify Dsl Github Sync Cron OPTIMISED - v29
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables:
  - description: Static Bearer token — cloud.dify.ai DevTools > Application > Local
      Storage > access_token
    id: env-dify-access-token
    name: DIFY_ACCESS_TOKEN
    selector:
    - env
    - DIFY_ACCESS_TOKEN
    value: ''
    value_type: secret
  - description: Dify host URL (e.g. http://172.30.116.165)
    id: env-dify-host
    name: DIFY_HOST
    selector:
    - env
    - DIFY_HOST
    value: http://172.30.116.165
    value_type: string
  - description: GitHub Personal Access Token with repo scope
    id: env-github-token
    name: GITHUB_TOKEN
    selector:
    - env
    - GITHUB_TOKEN
    value: ''
    value_type: secret
  - description: GitHub repository owner or organisation
    id: env-github-owner
    name: GITHUB_OWNER
    selector:
    - env
    - GITHUB_OWNER
    value: urvashijawere-ops
    value_type: string
  - description: GitHub repository name
    id: env-github-repo
    name: GITHUB_REPO
    selector:
    - env
    - GITHUB_REPO
    value: dify-dsl-sync
    value_type: string
  - description: Target branch for commits
    id: env-github-branch
    name: GITHUB_BRANCH
    selector:
    - env
    - GITHUB_BRANCH
    value: main
    value_type: string
  features:
    file_upload:
      allowed_file_extensions: []
      allowed_file_types: []
      allowed_file_upload_methods: []
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        sourceType: start
        targetType: code
      id: e-start-getapps
      source: start
      sourceHandle: source
      target: get_all_apps
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: code
        targetType: iteration
      id: e-getapps-iter
      source: get_all_apps
      sourceHandle: source
      target: iter_node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: iteration
        targetType: code
      id: e-iter-updatestate
      source: iter_node
      sourceHandle: source
      target: update_sync_state
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: code
        targetType: end
      id: e-updatestate-end
      source: update_sync_state
      sourceHandle: source
      target: end_node
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: true
        isInLoop: false
        iteration_id: iter_node
        sourceType: iteration-start
        targetType: code
      id: e-iterstart-sync
      source: iter_nodestart
      sourceHandle: source
      target: sync_one_app
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: true
        isInLoop: false
        iteration_id: iter_node
        sourceType: iteration-start
        targetType: code
      id: iter_nodestart0-source-sync_one_app-target
      source: iter_nodestart0
      sourceHandle: source
      target: sync_one_app
      targetHandle: target
      type: custom
      zIndex: 1002
    nodes:
    - data:
        desc: ''
        selected: false
        title: Start
        type: start
        variables: []
      height: 53
      id: start
      position:
        x: 30
        y: 300
      positionAbsolute:
        x: 30
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import httpx\nimport base64\nimport json\n\ndef main(DIFY_ACCESS_TOKEN:\
          \ str, DIFY_HOST: str,\n         GITHUB_TOKEN: str, GITHUB_OWNER: str,\n\
          \         GITHUB_REPO: str, GITHUB_BRANCH: str):\n\n    PAGE_SIZE = 100\n\
          \    MAX_PAGES = 100\n    BUFFER_S  = 60\n\n    # ── FIX B+D: Guard all\
          \ env vars before any HTTP call ──────────────\n    missing = []\n    if\
          \ not (DIFY_ACCESS_TOKEN or '').strip():\n        missing.append('DIFY_ACCESS_TOKEN')\n\
          \    if not (DIFY_HOST or '').strip():\n        missing.append('DIFY_HOST')\n\
          \    if not (GITHUB_TOKEN or '').strip():\n        missing.append('GITHUB_TOKEN')\n\
          \    if not (GITHUB_OWNER or '').strip():\n        missing.append('GITHUB_OWNER')\n\
          \    if not (GITHUB_REPO or '').strip():\n        missing.append('GITHUB_REPO')\n\
          \    if not (GITHUB_BRANCH or '').strip():\n        missing.append('GITHUB_BRANCH')\n\
          \    if missing:\n        return {\n            'filtered_apps':  [],\n\
          \            'total_apps':     0,\n            'filtered_count': 0,\n  \
          \          'last_sync_ts':   0,\n            'sync_state_sha': '',\n   \
          \         'status': f'Error: missing env vars — {\", \".join(missing)}'\n\
          \        }\n\n    host = DIFY_HOST.strip().rstrip('/')\n    dify_headers\
          \   = {'Authorization': f'Bearer {DIFY_ACCESS_TOKEN.strip()}'}\n    github_headers\
          \ = {\n        'Authorization':        f'Bearer {GITHUB_TOKEN.strip()}',\n\
          \        'Accept':               'application/vnd.github+json',\n      \
          \  'X-GitHub-Api-Version': '2022-11-28',\n    }\n    # ── FIX C: raise GitHub\
          \ connect timeout for cloud sandbox cold-start ──\n    dify_timeout   =\
          \ httpx.Timeout(connect=5.0,  read=10.0, write=5.0, pool=5.0)\n    github_timeout\
          \ = httpx.Timeout(connect=10.0, read=10.0, write=5.0, pool=5.0)\n\n    all_apps\
          \       = []\n    last_sync_ts   = 0\n    sync_state_sha = ''\n    page\
          \           = 1\n    state_status   = ''\n\n    # ── FIX A: Call Dify FIRST\
          \ — its failure gives a clearer error ──────\n    # GitHub .sync_state is\
          \ read AFTER, with graceful fallback on timeout.\n    try:\n        with\
          \ httpx.Client(timeout=dify_timeout) as dify_client:\n            while\
          \ page <= MAX_PAGES:\n                resp = dify_client.get(\n        \
          \            f'{host}/console/api/apps?page={page}&limit={PAGE_SIZE}',\n\
          \                    headers=dify_headers\n                )\n         \
          \       if resp.status_code == 401:\n                    return {\n    \
          \                    'filtered_apps':  [],\n                        'total_apps':\
          \     0,\n                        'filtered_count': 0,\n               \
          \         'last_sync_ts':   0,\n                        'sync_state_sha':\
          \ '',\n                        'status': 'Error: DIFY_ACCESS_TOKEN expired\
          \ — update it in Environment Variables'\n                    }\n       \
          \         resp.raise_for_status()\n                body  = resp.json()\n\
          \                batch = body.get('data', [])\n                all_apps.extend({\n\
          \                    'id':         a['id'],\n                    'name':\
          \         a['name'],\n                    'updated_at': a.get('updated_at',\
          \ 0)\n                } for a in batch)\n                if not body.get('has_more',\
          \ False) or not batch:\n                    break\n                page\
          \ += 1\n\n    except httpx.TimeoutException:\n        return {\n       \
          \     'filtered_apps':  [],\n            'total_apps':     0,\n        \
          \    'filtered_count': 0,\n            'last_sync_ts':   0,\n          \
          \  'sync_state_sha': '',\n            'status': f'Error: Dify API timeout\
          \ — verify DIFY_HOST ({host}) is reachable from the sandbox'\n        }\n\
          \    except Exception as e:\n        detail = f' | {e.response.text}' if\
          \ hasattr(e, 'response') else ''\n        return {\n            'filtered_apps':\
          \  [],\n            'total_apps':     0,\n            'filtered_count':\
          \ 0,\n            'last_sync_ts':   0,\n            'sync_state_sha': '',\n\
          \            'status': f'Error: Dify API — {str(e)}{detail}'\n        }\n\
          \n    # ── GitHub .sync_state — graceful fallback on any failure ────────\n\
          \    # If GitHub is unreachable: last_sync_ts stays 0 → all apps processed.\n\
          \    # This is safe: worst case we re-check all apps this run.\n    try:\n\
          \        with httpx.Client(timeout=github_timeout, headers=github_headers)\
          \ as gh_client:\n            state_url = (\n                f'https://api.github.com/repos/{GITHUB_OWNER}/{GITHUB_REPO}'\n\
          \                f'/contents/dsl/.sync_state?ref={GITHUB_BRANCH}'\n    \
          \        )\n            sr = gh_client.get(state_url)\n            if sr.status_code\
          \ == 200:\n                sdata          = sr.json()\n                sync_state_sha\
          \ = sdata.get('sha', '')\n                raw            = base64.b64decode(\n\
          \                    sdata.get('content', '').replace('\\n', '')\n     \
          \           ).decode('utf-8')\n                state_obj      = json.loads(raw)\n\
          \                last_sync_ts   = state_obj.get('last_sync_ts', 0)\n   \
          \             state_status   = f'state loaded (last_sync={last_sync_ts})'\n\
          \            elif sr.status_code == 404:\n                state_status =\
          \ 'first run — no .sync_state yet, processing all apps'\n            else:\n\
          \                state_status = f'GitHub state read error {sr.status_code}\
          \ — processing all apps'\n    except httpx.TimeoutException:\n        state_status\
          \ = 'WARNING: GitHub .sync_state timeout — processing all apps this run'\n\
          \    except Exception as e:\n        state_status = f'WARNING: GitHub .sync_state\
          \ error ({str(e)[:60]}) — processing all apps'\n\n    # ── Filter by updated_at\
          \ ─────────────────────────────────────────────\n    capped        = page\
          \ > MAX_PAGES\n    cutoff        = last_sync_ts - BUFFER_S\n    filtered_apps\
          \ = [a for a in all_apps if a.get('updated_at', 0) > cutoff]\n    total\
          \         = len(all_apps)\n    fcount        = len(filtered_apps)\n    status\
          \        = (\n        f'OK: {total} total | {fcount} to sync | {state_status}'\n\
          \        + (' | WARNING: hit page cap' if capped else '')\n    )\n    return\
          \ {\n        'filtered_apps':  filtered_apps,\n        'total_apps':   \
          \  total,\n        'filtered_count': fcount,\n        'last_sync_ts':  \
          \ last_sync_ts,\n        'sync_state_sha': sync_state_sha,\n        'status':\
          \         status\n    }\n"
        code_language: python3
        desc: Fetches all apps from Dify (PAGE_SIZE=100) and reads dsl/.sync_state
          from GitHub to get last_sync_ts. Filters to only apps where updated_at >
          last_sync_ts - 60s. First run (no .sync_state) passes all apps. Hard-fails
          on 401. Outputs filtered_apps, total_apps, filtered_count, last_sync_ts,
          sync_state_sha, status.
        outputs:
          filtered_apps:
            children: null
            type: array[object]
          filtered_count:
            children: null
            type: number
          last_sync_ts:
            children: null
            type: number
          status:
            children: null
            type: string
          sync_state_sha:
            children: null
            type: string
          total_apps:
            children: null
            type: number
        selected: false
        title: GET_ALL_APPS
        type: code
        variables:
        - value_selector:
          - env
          - DIFY_ACCESS_TOKEN
          value_type: string
          variable: DIFY_ACCESS_TOKEN
        - value_selector:
          - env
          - DIFY_HOST
          value_type: string
          variable: DIFY_HOST
        - value_selector:
          - env
          - GITHUB_TOKEN
          value_type: string
          variable: GITHUB_TOKEN
        - value_selector:
          - env
          - GITHUB_OWNER
          value_type: string
          variable: GITHUB_OWNER
        - value_selector:
          - env
          - GITHUB_REPO
          value_type: string
          variable: GITHUB_REPO
        - value_selector:
          - env
          - GITHUB_BRANCH
          value_type: string
          variable: GITHUB_BRANCH
      height: 209
      id: get_all_apps
      position:
        x: 330
        y: 300
      positionAbsolute:
        x: 330
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: ''
        error_handle_mode: continue-on-error
        height: 297
        is_parallel: false
        iterator_input_type: array[object]
        iterator_selector:
        - get_all_apps
        - filtered_apps
        output_selector:
