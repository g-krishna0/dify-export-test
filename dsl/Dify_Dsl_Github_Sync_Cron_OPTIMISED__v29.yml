    - data:
        code: "import httpx\nimport base64\nimport json\nfrom datetime import datetime,\
          \ timezone\n\ndef main(\n    GITHUB_TOKEN: str, GITHUB_OWNER: str,\n   \
          \ GITHUB_REPO: str, GITHUB_BRANCH: str,\n    total_apps: int, filtered_count:\
          \ int,\n    sync_state_sha: str\n):\n    # ── Guard: check required vars\
          \ before any HTTP call ────────────────\n    missing = []\n    if not (GITHUB_TOKEN\
          \ or '').strip():\n        missing.append('GITHUB_TOKEN')\n    if not (GITHUB_OWNER\
          \ or '').strip():\n        missing.append('GITHUB_OWNER')\n    if not (GITHUB_REPO\
          \ or '').strip():\n        missing.append('GITHUB_REPO')\n    if not (GITHUB_BRANCH\
          \ or '').strip():\n        missing.append('GITHUB_BRANCH')\n    if missing:\n\
          \        return {\n            'status':      f'Error: missing env vars\
          \ — {\", \".join(missing)}',\n            'new_sync_ts':  0,\n         \
          \   'new_sync_utc': '',\n        }\n\n    now_unix = int(datetime.now(timezone.utc).timestamp())\n\
          \    now_utc  = datetime.fromtimestamp(now_unix, tz=timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')\n\
          \n    state = {\n        'last_sync_ts':    now_unix,\n        'last_sync_utc':\
          \   now_utc,\n        'total_apps':      total_apps,\n        'filtered_count':\
          \ filtered_count,\n    }\n    content_b64 = base64.b64encode(\n        json.dumps(state,\
          \ indent=2).encode('utf-8')\n    ).decode('utf-8')\n\n    github_headers\
          \ = {\n        'Authorization':        f'Bearer {GITHUB_TOKEN.strip()}',\n\
          \        'Accept':               'application/vnd.github+json',\n      \
          \  'X-GitHub-Api-Version': '2022-11-28',\n    }\n    timeout = httpx.Timeout(connect=10.0,\
          \ read=10.0, write=8.0, pool=5.0)\n    url     = (\n        f'https://api.github.com/repos/{GITHUB_OWNER.strip()}/{GITHUB_REPO.strip()}'\n\
          \        f'/contents/dsl/.sync_state'\n    )\n    payload = {\n        'message':\
          \ f'chore: update sync state ({now_utc})',\n        'content': content_b64,\n\
          \        'branch':  GITHUB_BRANCH.strip(),\n    }\n    if sync_state_sha\
          \ and sync_state_sha.strip():\n        payload['sha'] = sync_state_sha.strip()\n\
          \n    try:\n        with httpx.Client(timeout=timeout, headers=github_headers)\
          \ as client:\n            resp = client.put(url, json=payload)\n       \
          \     resp.raise_for_status()\n            commit_sha = resp.json().get('commit',\
          \ {}).get('sha', 'unknown')[:7]\n            return {\n                'status':\
          \      f'OK: .sync_state updated (commit {commit_sha})',\n             \
          \   'new_sync_ts':  now_unix,\n                'new_sync_utc': now_utc,\n\
          \            }\n    except httpx.TimeoutException:\n        return {\n \
          \           'status':      'Error: GitHub timeout writing .sync_state',\n\
          \            'new_sync_ts':  0,\n            'new_sync_utc': '',\n     \
          \   }\n    except Exception as e:\n        detail = f' | {e.response.text}'\
          \ if hasattr(e, 'response') else ''\n        return {\n            'status':\
          \      f'Error: {str(e)[:80]}{detail}',\n            'new_sync_ts':  0,\n\
          \            'new_sync_utc': '',\n        }\n"
