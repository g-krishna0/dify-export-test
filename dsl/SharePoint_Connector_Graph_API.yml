        title: Merge API Responses
        type: variable-aggregator
        variables:
        - - node-http-list-files
          - body
        - - node-http-search
          - body
        - - node-http-get-file
          - body
        - - node-http-list-folder
          - body
        - - node-http-list-sites
          - body
      height: 275
      id: node-aggregator
      position:
        x: 1680
        y: 412
      positionAbsolute:
        x: 1680
        y: 412
      type: custom
      width: 244
    - data:
        code: "import json\n\ndef main(raw_response: str, action: str, site_id: str)\
          \ -> dict:\n    try:\n        data = json.loads(raw_response) if isinstance(raw_response,\
          \ str) else {}\n        if \"error\" in data and \"value\" not in data:\n\
          \            err = data[\"error\"]\n            msg = f\"{err.get('code','ERROR')}:\
          \ {err.get('message','Unknown error')}\"\n            return {\"success\"\
          : \"false\", \"action\": action, \"count\": 0, \"items\": \"[]\", \"raw\"\
          : raw_response[:2000], \"error_message\": msg, \"summary\": f\"Error - {msg}\"\
          }\n        if \"value\" in data:\n            items = data[\"value\"]\n\
          \            result = []\n            for item in items:\n             \
          \   result.append({\"id\": item.get(\"id\", \"\"), \"name\": item.get(\"\
          name\") or item.get(\"displayName\", \"\"), \"type\": \"folder\" if \"folder\"\
          \ in item else \"file\", \"size_kb\": round(item.get(\"size\", 0) / 1024,\
          \ 1), \"url\": item.get(\"webUrl\", \"\"), \"modified\": (item.get(\"lastModifiedDateTime\"\
          ) or \"\")[:10], \"download_url\": item.get(\"@microsoft.graph.downloadUrl\"\
          , \"\"), \"child_count\": item.get(\"folder\", {}).get(\"childCount\", 0)\
          \ if \"folder\" in item else 0})\n            lines = [f\"Action '{action}'\
          \ returned {len(result)} item(s):\"]\n            for it in result[:15]:\n\
          \                icon = \"\\U0001f4c1\" if it[\"type\"] == \"folder\" else\
          \ \"\\U0001f4c4\"\n                sz = f\" ({it['size_kb']} KB)\" if it[\"\
          type\"] == \"file\" else f\" ({it['child_count']} items)\"\n           \
          \     lines.append(f\"  {icon} {it['name']}{sz}\")\n            if len(result)\
          \ > 15:\n                lines.append(f\"  ... and {len(result) - 15} more\"\
          )\n            return {\"success\": \"true\", \"action\": action, \"count\"\
          : len(result), \"items\": json.dumps(result, ensure_ascii=False), \"raw\"\
          : raw_response[:2000], \"error_message\": \"\", \"summary\": \"\\n\".join(lines)}\n\
          \        item = data\n        result = [{\"id\": item.get(\"id\", \"\"),\
          \ \"name\": item.get(\"name\", \"\"), \"type\": \"folder\" if \"folder\"\
          \ in item else \"file\", \"size_kb\": round(item.get(\"size\", 0) / 1024,\
          \ 1), \"url\": item.get(\"webUrl\", \"\"), \"modified\": (item.get(\"lastModifiedDateTime\"\
          ) or \"\")[:10], \"download_url\": item.get(\"@microsoft.graph.downloadUrl\"\
          , \"\"), \"created_by\": (item.get(\"createdBy\") or {}).get(\"user\", {}).get(\"\
          displayName\", \"\"), \"modified_by\": (item.get(\"lastModifiedBy\") or\
          \ {}).get(\"user\", {}).get(\"displayName\", \"\")}]\n        r = result[0]\n\
          \        summary = f\"File: {r['name']}\\n  Type: {r['type']} | Size: {r['size_kb']}\
