      source: node-http-get-token
      sourceHandle: source
      target: node-code-validate-token
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: 'action: list_files|search|get_file|list_folder|list_sites. Credentials
          loaded from env vars TENANT_ID, CLIENT_ID, CLIENT_SECRET.'
        selected: false
