app:
  description: SharePoint connector using Microsoft Graph API. Supports list_files,
    search, get_file, list_folder, list_sites. No plugin required. Set TENANT_ID,
    CLIENT_ID, CLIENT_SECRET as environment variables before running.
  icon: 📁
  icon_background: '#0078D4'
  mode: workflow
  name: SharePoint Connector (Graph API)
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables:
  - description: Azure AD Tenant ID (Azure Portal > App Registration > Overview)
    id: env-tenant-id
    name: TENANT_ID
    selector:
    - env
    - TENANT_ID
    value: ''
    value_type: secret
  - description: Azure AD App Client ID
    id: env-client-id
    name: CLIENT_ID
    selector:
    - env
    - CLIENT_ID
    value: ''
    value_type: secret
  - description: Azure AD App Client Secret Value
    id: env-client-secret
    name: CLIENT_SECRET
    selector:
    - env
    - CLIENT_SECRET
    value: ''
    value_type: secret
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        sourceType: start
        targetType: http-request
      id: e-start-to-token
      source: node-start
      sourceHandle: source
      target: node-http-get-token
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: http-request
        targetType: code
      id: e-token-success-to-validate
      source: node-http-get-token
      sourceHandle: success-branch
      target: node-code-validate-token
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: http-request
        targetType: end
      id: e-token-fail-to-error
      source: node-http-get-token
      sourceHandle: fail-branch
      target: node-end-auth-error
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: code
        targetType: if-else
      id: e-validate-to-ifelse1
      source: node-code-validate-token
      sourceHandle: source
      target: node-ifelse-list-files
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: http-request
      id: e-ifelse1-true
      source: node-ifelse-list-files
      sourceHandle: 'true'
      target: node-http-list-files
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: if-else
      id: e-ifelse1-false
      source: node-ifelse-list-files
      sourceHandle: 'false'
      target: node-ifelse-search
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: http-request
      id: e-ifelse2-true
      source: node-ifelse-search
      sourceHandle: 'true'
      target: node-http-search
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: if-else
      id: e-ifelse2-false
      source: node-ifelse-search
      sourceHandle: 'false'
      target: node-ifelse-get-file
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: http-request
      id: e-ifelse3-true
      source: node-ifelse-get-file
      sourceHandle: 'true'
      target: node-http-get-file
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
