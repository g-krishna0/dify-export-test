        type: start
        variables:
        - label: Action
          options:
          - list_files
          - search
          - get_file
          - list_folder
          - list_sites
          required: true
          type: select
          variable: action
        - label: SharePoint Site ID
          max_length: 300
          required: false
          type: text-input
          variable: site_id
        - label: Search Query (search action only)
          max_length: 255
          required: false
          type: text-input
          variable: search_query
        - label: Item ID (get_file or list_folder only)
          max_length: 300
          required: false
          type: text-input
          variable: item_id
      height: 243
      id: node-start
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      type: custom
      width: 244
    - data:
        authorization:
          type: no-auth
        body:
          data:
          - key: grant_type
            type: text
            value: client_credentials
          - key: client_id
            type: text
            value: '{{#env.CLIENT_ID#}}'
          - key: client_secret
            type: text
            value: '{{#env.CLIENT_SECRET#}}'
          - key: scope
            type: text
            value: https://graph.microsoft.com/.default
          type: x-www-form-urlencoded
        desc: OAuth2 client_credentials flow. Token auto-refreshes every workflow
          run. Retries 3x on transient Azure AD errors.
        error_strategy: fail-branch
        headers: ''
        method: post
        params: ''
        retry_config:
          max_retries: 1
          retry_enabled: true
          retry_interval: 2000
        selected: false
        ssl_verify: true
        timeout:
          connect: 10
          max_connect_timeout: 10
          max_read_timeout: 30
          max_write_timeout: 10
          read: 30
          write: 10
        title: Get Azure AD Token
        type: http-request
        url: https://login.microsoftonline.com/{{#env.TENANT_ID#}}/oauth2/v2.0/token
      height: 254
      id: node-http-get-token
      position:
        x: 400
        y: 282
      positionAbsolute:
        x: 400
        y: 282
      selected: false
      type: custom
      width: 244
    - data:
        code: "import json\n\ndef main(body: str, status_code: int) -> dict:\n   \
          \ try:\n        data = json.loads(body) if isinstance(body, str) else body\n\
          \        access_token = data.get(\"access_token\", \"\")\n        if not\
          \ access_token:\n            err = data.get(\"error_description\", data.get(\"\
          error\", \"Token missing\"))\n            return {\"access_token\": \"\"\
          , \"is_valid\": \"false\", \"token_type\": \"\", \"expires_in\": 0, \"error\"\
          : f\"[{status_code}] {err}\"}\n        return {\"access_token\": access_token,\
          \ \"is_valid\": \"true\", \"token_type\": data.get(\"token_type\", \"Bearer\"\
          ), \"expires_in\": int(data.get(\"expires_in\", 3600)), \"error\": \"\"\
          }\n    except Exception as ex:\n        return {\"access_token\": \"\",\
          \ \"is_valid\": \"false\", \"token_type\": \"\", \"expires_in\": 0, \"error\"\
          : str(ex)}\n"
        code_language: python3
        desc: Parses the Azure AD token response and validates the access_token exists.
        outputs:
          access_token:
            children: null
            type: string
          error:
            children: null
            type: string
          expires_in:
            children: null
            type: number
          is_valid:
            children: null
            type: string
          token_type:
            children: null
            type: string
        selected: false
        title: Validate Token
        type: code
        variables:
        - value_selector:
          - node-http-get-token
          - body
          variable: body
        - value_selector:
          - node-http-get-token
          - status_code
          variable: status_code
