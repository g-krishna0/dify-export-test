          - email_template
        desc: 'Purpose: Parses the boilerplate email template to identify dynamically
          required fields (e.g., [Name], {{Date}}).


          Input: email_template from Input_ReceivePayload.


          Output: A comma-separated string or JSON list of required variables.


          Logic/Assumption: LLM is instructed to ignore conversational text and only
          extract the exact placeholder syntax.'
        model:
          completion_params:
            temperature: 0.8
          mode: chat
          name: gemini-flash-lite-latest
          provider: langgenius/gemini/google
        prompt_template:
        - id: 9e7f41e7-d501-46b4-b7d3-e8667dc0981a
          role: system
          text: "You are an analytical parser. Read the user's email template and\
            \ identify every variable or placeholder that needs to be filled (e.g.,\
            \ words/sub-words inside brackets like [Name] or {date} or <tag> etc.).\
            \ Extract these variables precisely as they appear. \nDo not include conversational\
            \ text."
        - id: 45d14421-e6c5-46f4-a393-bc32c8a88c8b
          role: user
          text: 'Template:

            {{#context#}}'
        reasoning_format: tagged
        selected: false
        structured_output:
          schema:
            properties:
              required_variables:
                description: List of all placeholders found in the template.
                items:
                  type: string
                type: array
            required:
            - required_variables
            type: object
        structured_output_enabled: true
