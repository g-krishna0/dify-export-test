app:
  description: 'Purpose: This reusable engine maps unstructured background context
    directly into standardized email templates to generate ready-to-send drafts.


    Flow: It safely identifies required fields, flags missing information, and prevents
    AI hallucinations to guarantee a perfectly formatted, corporate-ready email.'
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: workflow
  name: Engine_Mail_Drafter_POC
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
