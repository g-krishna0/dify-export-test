          Input: email_template, context_data, recipient_name, and the variable list
          from LLM_ExtractVariables.


          Output: The final formatted email string.


          Logic/Assumption: Enforces strict graceful failure. If a required variable
          is not found in the context, it must output [MISSING: VariableName]. Must
          not hallucinate or add markdown.'
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gemini-flash-lite-latest
          provider: langgenius/gemini/google
        prompt_template:
        - id: f5b1e798-bb75-4665-b81e-ea2e370cd7e8
          role: system
          text: 'You are a professional corporate email drafter. Your task is to fill
            in the provided ''Email Template'' using the provided ''Context Data''.


            Rules:

            1. Recipient Name is: {{#1778054423386.recipient_name#}}

            2. The required placeholders to fill are: {{#1778054574029.structured_output.required_variables#}}

            3. Map the Context Data to the placeholders accurately.

            4. If a required piece of data is completely missing from the Context
            Data, insert exactly {{#env.MISSING_DATA_TAG#}}.

            5. Do not summarize the boilerplate template text. Do not include markdown
            blocks (like ```json).

            6. Formatting: You MUST preserve the original line breaks and paragraph
            spacing of the template. Use\n or\n\n characters inside the JSON string
            to separate the lines properly.'
        - id: 1fb994c5-22c4-4bc4-b8f7-d4966288e7b6
          role: user
          text: 'Context Data:

            {{#1778054423386.context_data#}}


            Email Template:

            {{#1778054423386.email_template#}}'
        selected: false
        structured_output:
          schema:
            properties:
              email_body:
                description: The final drafted email with mapped variables.
                type: string
              email_subject:
                description: A crisp, professional subject line summarizing the drafted
                  email.
                type: string
            required:
            - email_body
            - email_subject
            type: object
        structured_output_enabled: true
        title: LLM_DraftEmail
        type: llm
        vision:
          enabled: false
      height: 342
