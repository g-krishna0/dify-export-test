    - data:
        desc: 'Purpose: Acts as the entry point for the Notification Engine, receiving
          the raw data from the calling system or agent.


          Input: recipient_name (String), email_template (String), context_data (String).


          Output: Passes raw variables to downstream nodes.


          Logic/Assumption: Assumes the calling system has validated the inputs before
          triggering this flow.'
