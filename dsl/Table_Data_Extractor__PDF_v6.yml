    - data:
        code: "import json, re\n\ndef clean(val):\n    if val is None:\n        return\
          \ \"\"\n    return re.sub(r'\\s+', ' ', str(val)).strip()\n\ndef auto_headers(raw):\n\
          \    return [clean(h) if clean(h) else f\"Column {i+1}\" for i, h in enumerate(raw)]\n\
          \ndef table_record(page_num, idx, headers, rows, source):\n    return {\n\
          \        \"table_index\": idx,\n        \"page\":        page_num,\n   \
          \     \"source_file\": source,\n        \"headers\":     headers,\n    \
          \    \"rows\":        rows,\n        \"row_count\":   len(rows),\n     \
          \   \"col_count\":   len(headers),\n    }\n\ndef main(local_paths: str,\
          \ file_names: str) -> dict:\n    paths = [p.strip() for p in local_paths.split(\"\
          \\n\") if p.strip()]\n    names = [n.strip() for n in file_names.split(\"\
          ,\")   if n.strip()]\n\n    import pdfplumber\n\n    all_tables  = []\n\
          \    total_pages = 0\n    errors      = []\n\n    for i, path in enumerate(paths):\n\
          \        fname = names[i] if i < len(names) else f\"file_{i+1}\"\n\n   \
          \     import os\n        if not os.path.exists(path):\n            errors.append(f\"\
          {fname}: not found at '{path}'\")\n            continue\n\n        try:\n\
          \            with pdfplumber.open(path) as pdf:\n                total_pages\
          \ += len(pdf.pages)\n                tbl_idx      = len(all_tables)\n\n\
          \                for pg_num, page in enumerate(pdf.pages, 1):\n        \
          \            # Pass 1: strict line strategy\n                    raw = page.extract_tables({\n\
          \                        \"vertical_strategy\":     \"lines_strict\",\n\
          \                        \"horizontal_strategy\":   \"lines_strict\",\n\
          \                        \"snap_tolerance\":         3,\n              \
          \          \"join_tolerance\":         3,\n                        \"edge_min_length\"\
          :        3,\n                        \"min_words_vertical\":     1,\n  \
          \                      \"min_words_horizontal\":   1,\n                \
          \        \"keep_blank_chars\":       False,\n                        \"\
          text_tolerance\":         3,\n                        \"intersection_tolerance\"\
          : 3,\n                    })\n                    # Pass 2: text fallback\
          \ for borderless tables\n                    if not raw:\n             \
          \           raw = page.extract_tables({\n                            \"\
          vertical_strategy\":   \"text\",\n                            \"horizontal_strategy\"\
          : \"text\",\n                        })\n\n                    for t in\
          \ (raw or []):\n                        if not t:\n                    \
          \        continue\n                        tbl_idx += 1\n              \
          \          headers   = auto_headers(t[0])\n                        data_rows\
          \ = []\n                        for row in t[1:]:\n                    \
          \        cells = [clean(c) for c in row]\n                            while\
          \ len(cells) < len(headers):\n                                cells.append(\"\
          \")\n                            data_rows.append(cells[:len(headers)])\n\
          \                        all_tables.append(\n                          \
          \  table_record(pg_num, tbl_idx, headers, data_rows, fname)\n          \
          \              )\n        except Exception as e:\n            errors.append(f\"\
          {fname}: {e}\")\n\n    return {\n        \"extracted_json\":    json.dumps({\n\
          \            \"tables_found\":      len(all_tables),\n            \"total_pages\"\
          :       total_pages,\n            \"extraction_errors\": errors,\n     \
          \       \"tables\":            all_tables,\n        }, ensure_ascii=False),\n\
          \        \"tables_found\":      str(len(all_tables)),\n        \"total_pages\"\
          :       str(total_pages),\n        \"extraction_errors\": \"; \".join(errors)\
          \ if errors else \"none\",\n    }\n"
        code_language: python3
        desc: Extract all tables from PDF using pdfplumber. Zero vision tokens.
        outputs:
          extracted_json:
            children: null
            type: string
          extraction_errors:
            children: null
            type: string
          tables_found:
            children: null
            type: string
          total_pages:
            children: null
            type: string
        selected: false
        title: Table extractor (no vision)
