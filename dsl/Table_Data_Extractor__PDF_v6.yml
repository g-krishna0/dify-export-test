        - id: sys-summary
          role: system
          text: 'You receive Markdown tables extracted from a document.

            Write a short plain-English summary for each table.

            {{#context#}}


            RULES:

            - Reference only values visible in the Markdown.

            - Blank or — cells: note the value could not be read.

            - No causal claims unless stated in the table.

            - If no tables: write "No tables were detected."


            FORMAT per table:

            **Table {index} — {title} (Page {page})**

            {2–3 sentences: columns, rows, key values, patterns, blanks.}

            Confidence: High | Medium | Low

            '
