          '
        model:
          completion_params:
            max_tokens: 8192
            temperature: 0
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-ocr
          role: system
          text: 'You are a table extraction engine for scanned documents.

            The uploaded file is a scanned PDF — no text layer exists.

            Use vision to read every table on every page.


            ══ OUTPUT: MARKDOWN ONLY ══

            No JSON. No prose. No code fences.


            For each table found:


            #### Table {n}: {title_if_visible} (Page {page_number})


            | Header 1 | Header 2 | … |

            |----------|----------|---|

            | value    | value    | … |


            CELL RULES:

            - Unreadable / blurry cell → —

            - Merged cell (horizontal) → repeat value, append (merged) once

            - Merged cell (vertical)   → use ↑ in continuation rows

            - Empty cell               → blank (spaces between pipes)

            - Numbers → copy exactly: preserve %, $, commas, decimals, units


            After all tables on a page:

            <!-- page {N}: {k} table(s) found -->


            If a page has no tables:

            <!-- page {N}: no tables -->


            If the entire document has no tables:

            > ℹ No tables detected — document may be a form, image, or diagram.

            '
        - id: user-ocr
          role: user
          text: 'File: {{#node-file-downloader.file_names#}}

            Pages: {{#node-table-extractor.total_pages#}}


            Extract ALL tables from ALL pages. Output Markdown only.

            '
        selected: false
