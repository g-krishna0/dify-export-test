    - data:
        code: "import os, re, tempfile, urllib.request, urllib.error\n\ndef get_attr(f,\
          \ *keys):\n    for k in keys:\n        try:\n            v = getattr(f,\
          \ k, None)\n            if v is not None:\n                return str(v)\n\
          \        except Exception:\n            pass\n    if isinstance(f, dict):\n\
          \        for k in keys:\n            if f.get(k) is not None:\n        \
          \        return str(f[k])\n    return \"\"\n\ndef main(input_files) -> dict:\n\
          \    files = (\n        input_files if isinstance(input_files, list)\n \
          \       else ([input_files] if input_files else [])\n    )\n\n    local_paths\
          \ = []\n    file_names  = []\n    errors      = []\n\n    for f in files:\n\
          \        name = get_attr(f, \"filename\", \"name\") or \"uploaded.pdf\"\n\
          \        url  = get_attr(f, \"url\", \"remote_url\", \"download_url\",\n\
          \                        \"local_path\", \"path\")\n\n        if not url:\n\
          \            errors.append(f\"{name}: no URL found\")\n            continue\n\
          \n        # Already a real local path\n        if url.startswith(\"/\")\
          \ and os.path.exists(url):\n            local_paths.append(url)\n      \
          \      file_names.append(name)\n            continue\n\n        safe_name\
          \ = re.sub(r'[^\\w.\\-]', '_', name)\n        tmp_path  = os.path.join(tempfile.gettempdir(),\
          \ safe_name)\n\n        try:\n            req = urllib.request.Request(\n\
          \                url, headers={\"User-Agent\": \"DifyWorkflow/1.0\"}\n \
          \           )\n            with urllib.request.urlopen(req, timeout=60)\
          \ as resp, \\\n                 open(tmp_path, \"wb\") as fp:\n        \
          \        fp.write(resp.read())\n\n            if not os.path.exists(tmp_path)\
          \ or os.path.getsize(tmp_path) == 0:\n                errors.append(f\"\
          {name}: downloaded file is empty\")\n                continue\n\n      \
          \      local_paths.append(tmp_path)\n            file_names.append(name)\n\
          \n        except urllib.error.HTTPError as e:\n            errors.append(f\"\
          {name}: HTTP {e.code} — {e.reason}\")\n        except urllib.error.URLError\
          \ as e:\n            errors.append(f\"{name}: URL error — {e.reason}\")\n\
          \        except Exception as e:\n            errors.append(f\"{name}: {e}\"\
          )\n\n    return {\n        \"local_paths\":     \"\\n\".join(local_paths),\n\
          \        \"file_names\":      \", \".join(file_names),\n        \"file_count\"\
          :      str(len(local_paths)),\n        \"download_errors\": \"; \".join(errors)\
          \ if errors else \"none\",\n    }\n"
        code_language: python3
        desc: Download Dify signed-URL PDF to /tmp for pdfplumber.
        outputs:
          download_errors:
            children: null
            type: string
          file_count:
            children: null
            type: string
          file_names:
            children: null
            type: string
          local_paths:
            children: null
            type: string
        selected: false
        title: File downloader
        type: code
        variables:
        - value_selector:
          - node-start
          - input_file
          value_type: array[file]
          variable: input_files
