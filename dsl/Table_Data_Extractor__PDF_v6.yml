    - data:
        code: "import re\n\ndef main(\n    full_markdown:     str,\n    tables_found:\
          \      str,\n    total_pages:       str,\n    file_names:        str,\n\
          \    file_count:        str,\n    extraction_errors: str,\n    download_errors:\
          \   str,\n    validate_error:    str,\n    extraction_path:   str,\n) ->\
          \ dict:\n\n    heading_re = re.compile(\n        r'####\\s+Table\\s+(\\\
          d+)(?:\\s*:\\s*([^(\\n]+?))?\\s*\\(Page\\s+(\\d+)\\)',\n        re.IGNORECASE\n\
          \    )\n\n    toc_rows    = []\n    page_counts = {}\n\n    for m in heading_re.finditer(full_markdown):\n\
          \        idx   = m.group(1)\n        title = (m.group(2) or \"\").strip()\
          \ or \"—\"\n        page  = m.group(3)\n        toc_rows.append(f\"| {idx}\
          \ | {page} | {title} |\")\n        page_counts[page] = page_counts.get(page,\
          \ 0) + 1\n\n    toc = (\n        \"| Table | Page | Title |\\n|-------|------|-------|\\\
          n\"\n        + \"\\n\".join(toc_rows)\n    ) if toc_rows else \"> No table\
          \ headings detected.\"\n\n    page_dist = (\n        \"| Page | Tables |\\\
          n|------|--------|\\n\"\n        + \"\\n\".join(\n            f\"| {pg}\
          \ | {cnt} |\"\n            for pg, cnt in sorted(page_counts.items(), key=lambda\
          \ x: int(x[0]))\n        )\n    ) if page_counts else \"> No page data.\"\
          \n\n    err_parts = []\n    if validate_error and validate_error not in\
          \ (\"\", \"none\"):\n        err_parts.append(f\"Validation: {validate_error}\"\
          )\n    if download_errors and download_errors != \"none\":\n        err_parts.append(f\"\
          Download: {download_errors}\")\n    if extraction_errors and extraction_errors\
          \ != \"none\":\n        err_parts.append(f\"Extraction: {extraction_errors}\"\
          )\n    error_block = (\"> ⚠ \" + \" | \".join(err_parts)) if err_parts else\
          \ \"\"\n\n    path_label = {\n        \"text\": \"pdfplumber (text-based\
          \ PDF — zero vision tokens)\",\n        \"ocr\":  \"Gemini vision OCR (scanned\
          \ PDF — vision tokens used)\",\n        \"error\": \"Error — see warnings\
          \ above\",\n    }.get(extraction_path, extraction_path)\n\n    return {\n\
          \        \"table_of_contents\":  toc,\n        \"page_distribution\":  page_dist,\n\
          \        \"error_block\":        error_block,\n        \"global_table_count\"\
          : tables_found,\n        \"path_label\":         path_label,\n    }\n"
