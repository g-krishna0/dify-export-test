app:
  description: Upload a PDF. The workflow downloads it from Dify's signed URL, extracts
    every table using pdfplumber (zero vision tokens — handles 100+ pages without
    hitting token limits), with automatic fallback to vision-OCR for scanned PDFs.
    Outputs clean Markdown tables, a page index, and a plain-English summary.
  icon: 📋
  icon_background: '#E8F5E9'
  mode: workflow
  name: Table Data Extractor — PDF v6
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .PDF
      - .DOCX
      - .XLSX
      - .XLS
      - .CSV
      allowed_file_types:
      - document
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 5
    opening_statement: ''
    retriever_resource:
