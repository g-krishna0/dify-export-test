      width: 244
    - data:
        code: "import json\n\nBATCH_SIZE = 15\n\ndef main(\n    extracted_json: str,\n\
          \    ocr_markdown:   str,\n) -> dict:\n    \"\"\"\n    Two inputs — exactly\
          \ one will be populated:\n      extracted_json  → text-based path (pdfplumber\
          \ JSON)\n      ocr_markdown    → scanned path (LLM Markdown string)\n\n\
          \    Scanned detection: if extracted_json has tables_found==0\n    AND the\
          \ first file type was pdf, treat as scanned.\n    The ocr_markdown input\
          \ will be populated by the OCR node\n    only when it ran; otherwise it\
          \ arrives as an empty string.\n    \"\"\"\n\n    # ── OCR PATH: wrap raw\
          \ Markdown in a pseudo-batch ──────────\n    if ocr_markdown and ocr_markdown.strip():\n\
          \        synthetic = [{\n            \"batch_index\":  1,\n            \"\
          tables\":       [],\n            \"is_empty\":     False,\n            \"\
          ocr_markdown\": ocr_markdown.strip(),\n        }]\n        return {\n  \
          \          \"batch_array\":     synthetic,\n            \"extraction_path\"\
          : \"ocr\",\n        }\n\n    # ── TEXT PATH: split JSON into real batches\
          \ ────────────────\n    try:\n        data = json.loads(extracted_json)\n\
          \    except Exception:\n        return {\n            \"batch_array\": \
          \    [{\"batch_index\": 1, \"tables\": [], \"is_empty\": True}],\n     \
          \       \"extraction_path\": \"error\",\n        }\n\n    tables = data.get(\"\
          tables\", [])\n\n    if not tables:\n        return {\n            \"batch_array\"\
          :     [{\"batch_index\": 1, \"tables\": [], \"is_empty\": True}],\n    \
          \        \"extraction_path\": \"text\",\n        }\n\n    batches = []\n\
          \    for i in range(0, len(tables), BATCH_SIZE):\n        chunk = tables[i\
          \ : i + BATCH_SIZE]\n        batches.append({\n            \"batch_index\"\
          :  len(batches) + 1,\n            \"tables\":       chunk,\n           \
          \ \"is_empty\":     False,\n            \"ocr_markdown\": \"\",\n      \
          \  })\n\n    return {\n        \"batch_array\":     batches,\n        \"\
          extraction_path\": \"text\",\n    }\n"
        code_language: python3
        desc: 'Splits text-path JSON into batches of 15, OR wraps OCR Markdown into
          a single synthetic batch. Returns array[object] for the loop.

          '
        outputs:
          batch_array:
            children: null
            type: array[object]
          extraction_path:
            children: null
            type: string
        selected: false
