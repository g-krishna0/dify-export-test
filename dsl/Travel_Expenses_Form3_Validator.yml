    - data:
        code: "import re\nimport json\n\n# Get the raw text from Doc Extractor\nraw_text\
          \ = doc_text\n\n# -RULE-BASED EXTRACTION-\n\n# Rule 1: Extract Supplier\
          \ Name\n# Assumption: Supplier name is in first few lines, after \"Supplier:\"\
          \nsupplier_name = \"\"\nsupplier_match = re.search(r'Supplier[:\\s]+([^\\\
          n]+)', raw_text, re.IGNORECASE)\nif supplier_match:\n    supplier_name =\
          \ supplier_match.group(1).strip()\n\n# Rule 2: Extract Date\n# Assumption:\
          \ Date is in YYYY-MM-DD or DD/MM/YYYY format\ndate_str = \"\"\ndate_match\
          \ = re.search(r'(\\d{4}-\\d{2}-\\d{2}|\\d{2}/\\d{2}/\\d{4})', raw_text)\n\
          if date_match:\n    date_str = date_match.group(1).strip()\n\n# Rule 3:\
          \ Extract Employee Type\n# Assumption: Contains \"Executive\" or \"Staff\"\
          \nemployee_type = \"Staff\"  # Default\nif \"executive\" in raw_text.lower():\n\
          \    employee_type = \"Executive\"\n\n# Rule 4: Extract Data Rows\n# Assumption:\
          \ Form has table-like structure\ndata_rows = []\n\nlines = raw_text.split('\\\
          n')\nfor line in lines:\n    amount_match = re.search(r'(\\d+\\.?\\d*)',\
          \ line)\n    if amount_match:\n        parts = line.split('|')  # If pipe-separated\n\
          \        if len(parts) >= 2:\n            try:\n                amount =\
          \ float(amount_match.group(1))\n                category = parts[0].strip()\
          \ if len(parts) > 0 else \"\"\n                sub_category = parts[1].strip()\
          \ if len(parts) > 1 else \"\"\n                revision = parts[-1].strip()\
          \ if len(parts) > 2 else \"\"\n                \n                if category\
          \ and amount > 0:\n                    data_rows.append({\n            \
          \            \"category\": category,\n                        \"sub_category\"\
          : sub_category,\n                        \"amount\": amount,\n         \
          \               \"revision_category\": revision\n                    })\n\
          \            except:\n                pass\n\n# Return extracted data as\
          \ dictionary\nextracted_data = {\n    \"supplier_name\": supplier_name,\n\
          \    \"date\": date_str,\n    \"employee_type\": employee_type,\n    \"\
          data_rows\": data_rows\n}\n"
        code_language: python3
        desc: Extract Data Rule based, extract supplier name, date, employee type,
          data rows
        outputs:
          extracted_data:
            children: null
            type: string
        selected: false
        title: Extract_Data_RuleBased
        type: code
        variables: []
