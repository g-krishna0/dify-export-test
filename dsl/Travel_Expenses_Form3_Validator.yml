    - data:
        code: "from datetime import datetime\nimport json\n \n# Get extracted data\
          \ from Node 3\nsupplier_name = extracted_data.get('supplier_name', '')\n\
          date_str = extracted_data.get('date', '')\nemployee_type = extracted_data.get('employee_type',\
          \ 'Staff')\ndata_rows = extracted_data.get('data_rows', [])\n \n# Get PMS\
          \ suppliers list from variable (get from Shubham, assuming it is pms_suppliers_list\
          \ also kept in input variable in validate rules node)\ntry:\n    if isinstance(pms_suppliers_list,\
          \ str):\n        pms_database = json.loads(pms_suppliers_list)\n    else:\n\
          \        pms_database = pms_suppliers_list\nexcept:\n    pms_database =\
          \ []\n \nresults = []\n \n# RULE 20: DATE VALIDATION\n \nif not date_str:\n\
          \    results.append({\n        \"rule\": 20,\n        \"status\": \"FAIL\"\
          ,\n        \"issue\": \"Date is empty\",\n        \"correction\": \"Enter\
          \ date in YYYY-MM-DD format\"\n    })\nelse:\n    try:\n        date_obj\
          \ = datetime.strptime(date_str, '%Y-%m-%d')\n        if date_obj > datetime.now():\n\
          \            results.append({\n                \"rule\": 20,\n         \
          \       \"status\": \"FAIL\",\n                \"issue\": f\"Date {date_str}\
          \ is in future\",\n                \"correction\": \"Provide current or\
          \ past date\"\n            })\n        elif date_obj.year < 2000:\n    \
          \        results.append({\n                \"rule\": 20,\n             \
          \   \"status\": \"FAIL\",\n                \"issue\": f\"Date {date_str}\
          \ is too old\",\n                \"correction\": \"Provide recent date (after\
          \ 2000)\"\n            })\n        else:\n            results.append({\"\
          rule\": 20, \"status\": \"PASS\"})\n    except:\n        results.append({\n\
          \            \"rule\": 20,\n            \"status\": \"FAIL\",\n        \
          \    \"issue\": f\"Date format invalid: {date_str}\",\n            \"correction\"\
          : \"Use format YYYY-MM-DD\"\n        })\n \n# RULE 21: SUPPLIER NAME VALIDATION\
          \ (DYNAMIC PMS)\n \nif not supplier_name:\n    results.append({\n      \
          \  \"rule\": 21,\n        \"status\": \"FAIL\",\n        \"issue\": \"Supplier\
          \ name is empty\",\n        \"correction\": \"Enter supplier name\"\n  \
          \  })\nelse:\n    # Check if PMS database is empty\n    if not pms_database:\n\
          \        results.append({\n            \"rule\": 21,\n            \"status\"\
          : \"FAIL\",\n            \"issue\": \"PMS database not available\",\n  \
          \          \"correction\": \"Contact administrator  PMS data not loaded\"\
          \n        })\n    else:\n        # Compare supplier name against PMS list\
          \ (dynamic)\n        name_lower = supplier_name.lower()\n        found =\
          \ False\n        \n        # Handle different PMS data formats\n       \
          \ for pms_entry in pms_database:\n            # If pms_entry is a string\n\
          \            if isinstance(pms_entry, str):\n                pms_name =\
          \ pms_entry.lower()\n            # If pms_entry is a dict with 'name' field\n\
          \            elif isinstance(pms_entry, dict):\n                pms_name\
          \ = pms_entry.get('name', '').lower()\n            else:\n             \
          \   continue\n            \n            if name_lower == pms_name:\n   \
          \             results.append({\"rule\": 21, \"status\": \"PASS\"})\n   \
          \             found = True\n                break\n        \n        if\
          \ not found:\n            results.append({\n                \"rule\": 21,\n\
          \                \"status\": \"FAIL\",\n                \"issue\": f\"Supplier\
          \ name '{supplier_name}' not found in PMS database\",\n                \"\
          correction\": \"Verify name against PMS or update PMS database\"\n     \
          \       })\n \n# RULE 24: DAILY ALLOWANCE VALIDATION (PLACEHOLDER)\n# Will\
          \ update after client answers\n \nrule_24_issues = []\n \nfor row in data_rows:\n\
          \    revision_category = row.get('revision_category', '').lower()\n    \n\
          \    if 'daily allowance change' not in revision_category and 'new addition'\
          \ not in revision_category:\n        continue\n    \n    amount = row.get('amount',\
          \ 0)\n    \n    if amount <= 0:\n        rule_24_issues.append({\n     \
          \       \"category\": row.get('category', ''),\n            \"issue\": \"\
          Amount must be positive\",\n            \"found\": amount\n        })\n\
          \ \nif rule_24_issues:\n    for issue in rule_24_issues:\n        results.append({\n\
          \            \"rule\": 24,\n            \"status\": \"FAIL\",\n        \
          \    \"category\": issue['category'],\n            \"issue\": issue['issue']\n\
          \        })\nelse:\n    results.append({\"rule\": 24, \"status\": \"PASS\"\
          })\n \n# Summarize\npassed = len([r for r in results if r.get('status')\
          \ == 'PASS'])\nfailed = len([r for r in results if r.get('status') == 'FAIL'])\n\
          \ \nvalidation_results = {\n    \"supplier_name\": supplier_name,\n    \"\
          passed\": passed,\n    \"failed\": failed,\n    \"has_issues\": failed >\
          \ 0,\n    \"results\": results\n}\n"
        code_language: python3
        desc: Validate rules 20,21,24 against extracted data
        outputs:
          validation_results:
            children: null
            type: string
        selected: false
        title: Validate_Rules_20_21_24
        type: code
