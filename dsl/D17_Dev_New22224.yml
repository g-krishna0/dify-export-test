    - data:
        code: "import re\nimport json\nfrom typing import List, Dict, Any\n\ndef main(input_data:\
          \ str, lang: str, static_data: dict) -> dict:\n    t = static_data.get(\"\
          client_data\", {}).get(lang, {})\n    fixed_file_name = \"02_[○○ Procurement]\
          \ Summary of Negotiation Status (4)\"\n    \n    # Keywords jinhe cells\
          \ ke andar dhoondna hai\n    doc_keywords = [\"EXCEL\", \"PDF\", \"APPROVED\"\
          ]\n\n    try:\n        # 1. Parsing Input (Same as before)\n        if isinstance(input_data,\
          \ str):\n            try:\n                first_parse = json.loads(input_data)\n\
          \                inner_text = first_parse.get(\"text\", \"\")\n        \
          \        data_dict = json.loads(inner_text) if isinstance(inner_text, str)\
          \ and inner_text.startswith(\"{\") else first_parse\n            except:\n\
          \                data_dict = {\"text\": input_data}\n        else:\n   \
          \         data_dict = input_data\n        \n        raw_text = data_dict.get(\"\
          text\", \"\")\n        match = re.search(r'data:\\s*\\[(.*?)\\]', raw_text,\
          \ re.DOTALL)\n        if not match:\n            return {\"result\": [],\
          \ \"client_selection\": \"\", \"clients_available\": \"False\", \"error\"\
          : \"No data\"}\n\n        content = match.group(1).strip()\n        object_matches\
          \ = re.findall(r'\\{([^}]+)\\}', content)\n        \n        # Result Lists\n\
          \        result_list = []\n        client_selection_lines = [\"Client No\
          \ | Client name | File Name\"]\n        \n        # Lists for Variable Assigner\
          \ (Full Sheet)\n        all_comp_cat, all_suppliers, all_buyers = [], [],\
          \ []\n        all_qt_amt, all_price_lvl, all_comments = [], [], []\n   \
          \     all_doc_status = [] # Dynamic collection variable\n\n        seen_clients\
          \ = set()\n        display_counter = 0\n\n        # 2. Main Processing Loop\n\
          \        for obj_str in object_matches:\n            pairs = re.findall(r'([^,:]+?)\\\
          s*:\\s*([^,}]*)', obj_str)\n            obj_dict = {p[0].strip(): p[1].strip()\
          \ for p in pairs}\n\n            # --- A. Static Extraction (Based on Mapping)\
          \ ---\n            all_comp_cat.append(obj_dict.get(\"Company Category\"\
          , \"N/A\"))\n            s_name = obj_dict.get(\"Supplier / Business Partner\
          \ Name\", \"N/A\")\n            all_suppliers.append(s_name)\n         \
          \   all_buyers.append(obj_dict.get(\"Buyer\", \"N/A\"))\n            all_qt_amt.append(obj_dict.get(\"\
          Supplier / Business Partner Quote Amount (K$)\", \"N/A\"))\n           \
          \ all_price_lvl.append(obj_dict.get(\"TBL Unit Price Level\", \"N/A\"))\n\
          \            all_comments.append(obj_dict.get(\"Comments on TBL Negotiation\
          \ Status\", \"N/A\"))\n\n            # --- B. Dynamic Extraction (Scanner\
          \ for EXCEL/PDF/Approved) ---\n            row_docs = []\n            for\
          \ key, value in obj_dict.items():\n                val_upper = str(value).upper()\n\
          \                # Agar kisi bhi cell mein EXCEL, PDF ya APPROVED mil jaye\n\
          \                if any(kw in val_upper for kw in doc_keywords):\n     \
          \               # Hum column ka naam (key) aur cell ki value dono le lenge\n\
          \                    row_docs.append(f\"[{key}: {value}]\")\n          \
          \  \n            all_doc_status.append(\" | \".join(row_docs) if row_docs\
          \ else \"Blank\")\n\n            # --- C. Display Logic (Top 3 Unique) ---\n\
          \            if s_name != \"N/A\" and s_name not in seen_clients and display_counter\
          \ < 3:\n                seen_clients.add(s_name)\n                display_counter\
          \ += 1\n                client_id = f\"{display_counter:02d}\"\n       \
          \         client_selection_lines.append(f\"{client_id} | {s_name} | {fixed_file_name}\"\
          )\n                result_list.append({\"client_id\": client_id, \"Supplier\"\
          : s_name})\n\n        return {\n            \"result\": result_list,\n \
          \           \"client_selection\": \"\\n\".join(client_selection_lines),\n\
          \            \"clients_available\": \"True\" if display_counter > 0 else\
          \ \"False\",\n            \"error\": \"\",\n            # Backend Variables\n\
          \            \"company_category\": \", \".join(all_comp_cat),\n        \
          \    \"supplier_name\": \", \".join(all_suppliers),\n            \"buyer\"\
          : \", \".join(all_buyers),\n            \"client_quote_amount\": \", \"\
          .join(all_qt_amt),\n            \"tbl_unit_price_level\": \", \".join(all_price_lvl),\n\
          \            \"comments\": \", \".join(all_comments),\n            \"doc_status\"\
          : \" || \".join(all_doc_status) # Dynamic Output\n        }\n\n    except\
          \ Exception as e:\n        return {\"result\": [], \"client_selection\"\
          : \"\", \"error\": str(e), \"clients_available\": \"False\"}"
        code_language: python3
