    id: bd9e5317-80d2-40b1-b034-1fb17ccd21ea
    name: static_data
    selector:
    - conversation
    - static_data
    value:
      button_template: '{index}. <button type="button" data-message="{id}">{label}</button>'
      choose_client_msg:
        en: '

          Please enter the number corresponding to the client you want to proceed
          with. For example, to proceed with Client 1, enter 01.'
        jp: '

          続行するクライアントに対応する番号を入力してください。例えば、Client 1を続行するには、01と入力してください。'
      client_data:
        en:
          error_no_name: No client name found in the data.
          header: Client No | Client name | Business Unit | Submission date
          no_client: No Client Data Found
          no_data: No data list found
          no_date: No date found
        jp:
          error_no_name: データ内に取引先名が見つかりません。
          header: 顧客番号 | 取引先名 | 担当調達部署 | 確認書提出日
          no_client: クライアントデータが見つかりません
          no_data: データリストが見つかりませんでした
          no_date: 日付なし
      document_received_msg:
        en: Progress Management Sheet uploaded successfully. We are now processing
          the records; please wait a moment while we generate the client list.
        jp: 進捗管理表のアップロードが完了しました。現在、レコードを処理しております。取引先一覧を生成しますので、少々お待ちください。
      error_message_document_received:
        en: Something went wrong with the previous upload. Could you please re-upload
          the *Progress Management Sheet*?
        jp: 前回のアップロード処理で問題が発生しました。お手数ですが、進捗管理表を再度アップロードしていただけますでしょうか。
      error_message_file_extractor:
        en: We could not process your file, could you please upload the document again?
        jp: ファイルを処理できませんでした。もう一度ファイルをアップロードしていただけますか？
      error_message_file_missing:
        en: A file is required for this process. Please upload it.
        jp: この処理にはファイルが必要です。アップロードしてください。
      error_message_language:
        buttons:
        - id: English
          label: English
        - id: 日本語
          label: 日本語
        en_jp: "Sorry, we could not update your preference, could you re-select your\
          \ preferred langauge.\n\n 申し訳ありませんが、お客様の設定を更新できませんでした。もう一度ご希望の言語を選択してください。"
      file_missing_msg:
        en: A *Progress Management Sheet* file is required for this process. Please
          upload it.
        jp: この処理には進捗管理表が必要です。進捗管理表をアップロードしてください。
      invalid_client_msg:
        en: The client id you selected is invalid. Please choose a valid client id
          between 1 and 3.
        jp: 選択したクライアントIDが無効です。1から3の有効なクライアントIDを選択してください。
      pms_sheet_name:
        en: 'The Progress Management Sheet file name must include: ''02_[○○ Procurement]
          Summary of Negotiation Status''..'
        jp: 進捗管理シートのファイル名には、「02_[○○ 調達] 交渉状況の概要」を含める必要があります。
      request_file_msg:
        en: A *Progress Management Sheet* file is required for this process. Please
          upload it.
        jp: この処理には進捗管理表が必要です。進捗管理表をアップロードしてください。
      selected_client_msg:
        en: You have selected {client_name}. We will now analyze the error and provide
          recommendations for it.
        jp: '{client_name}を選択しました。これからエラーを分析し、推奨事項を提供します。'
      upload_file_size_error_message:
        en: Please provide a Progress Management Sheet file that is smaller than 10MB.
        jp: 10MB未満の進捗管理表ファイルをアップロードしてください。
      upload_file_type_error_message:
        en: Please upload the *Progress Management Sheet* file in **Excel ** format.
        jp: 進捗管理表はExcel形式でアップロードしてください。
      user_guide:
        en: "Your preferred language has been set to English. \n\n **Operating Procedure**:\n\
          \n  **Interface Configuration:** Select your preferred language (Japanese\
          \ or English) to initialize the localized interface.\n**Requisition Input:**\
          \ Submit your requirements by describing them in the natural language chat\
          \ and by uploading supporting documentation  (Excel Format). \n**Client\
          \ Selection:** Please select one client from the list.  \n**Recommendation:**\
          \ Recommends how to correct errors, address omissions, and fix other deficiencies.\
          \  \n**Review and Confirm:** BPO Staff/Person in charge can review and confirm\
          \ whether he wants to rectify the data or send a notification(email) to\
          \ the Business User/Vendor.  \n**Email Draft:** Generates a professional\
          \ notification email based on the findings.  \n\nPlease upload the document\
          \ - Progress Management Sheet. \nWhile uploading, mention the current month\
          \ and year in the following format: MM/YYYY \nFor example: 11/2025"
        jp: "ご希望の言語は日本語に設定されました。  \n\n**操作手順**: \n\nインターフェース設定：\n ご希望の言語（日本語または英語）を選択し、ローカライズされたインターフェースを初期化します。\
          \ \n\n依頼内容の入力：\n 自然言語チャットで要件を説明し、関連資料（Excel形式）をアップロードして送信してください。\n\n取引先選択：\n\
          \ 表示された一覧から、対象となる取引先を1社選択してください。 \n\n推奨対応：\n エラー、記載漏れ、その他の不備に対して、修正方法および対応方針を推奨します。\
          \ \n\n確認および判断：\n BPOスタッフ / 担当者は、AIの出力内容を確認し、データを修正するか、または業務ユーザー / ベンダーへ通知メールを送信するかを判断します。\
          \ \n\nメール案作成：\n 検出された内容に基づき、業務利用に適した通知メール案を生成します。  \n\n 資料をアップロードしてください：進捗管理表\
          \ \nアップロードする際は、現在の月と年をMM/YYYYの形式で記載してください。\n例：11/2025"
    value_type: object
