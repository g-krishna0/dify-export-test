    - data:
        code: "import re\n\ndef main(file_respnse: list, static_data: dict, preferred_lang:\
          \ str, uploaded_file_config: dict):\n    # 1. Configuration se sheet aur\
          \ columns ki details nikalna\n    sheet = uploaded_file_config.get(\"sheet_name\"\
          , \"\")\n    columns = uploaded_file_config.get(\"list_of_columns\", \"\"\
          )\n\n    # Helper function messages fetch karne ke liye\n    def get_translated_msg(key):\n\
          \        msg_obj = static_data.get(key, {})\n        text = msg_obj.get(preferred_lang)\
          \ or msg_obj.get(\"ja\") or msg_obj.get(\"jp\")\n        return text if\
          \ text else \"\"\n\n    # 2. Pehle check karein ki file upload hui hai ya\
          \ nahi\n    if not file_respnse or len(file_respnse) == 0:\n        msg\
          \ = get_translated_msg(\"file_missing_msg\")\n        return {\n       \
          \     \"result\": msg,\n            \"is_valid\": \"false\",\n         \
          \   \"sheet\": sheet,\n            \"columns\": columns,\n            \"\
          preferred_lang\": preferred_lang,\n            \"file_name\": \"\" # File\
          \ missing hai toh name empty rahega\n        }\n\n    file_data = file_respnse[0]\n\
          \    file_info = file_data.get(\"file_info\", [{}])[0]\n    \n    # PMS\
          \ ka original file name nikalna\n    actual_file_name = file_info.get(\"\
          name\", \"\")\n    \n    errors = []\n\n    # 3. Condition 1: File Size\
          \ Check (> 10MB)\n    total_size = file_data.get(\"total_size\", 0)\n  \
          \  if total_size > (10 * 1024 * 1024):\n        msg = get_translated_msg(\"\
          upload_file_size_error_message\")\n        if msg: errors.append(msg)\n\n\
          \    # 4. Condition 2: File Type Check (.xlsx)\n    file_type = file_info.get(\"\
          type\", \"\").lower()\n    if file_type != \"xlsx\":\n        msg = get_translated_msg(\"\
          upload_file_type_error_message\")\n        if msg: errors.append(msg)\n\n\
          \    # 5. Condition 3: File Name Validation (Keywords check)\n    uploaded_file_name_lower\
          \ = actual_file_name.lower()\n    keywords = [\"02\", \"procurement\", \"\
          negotiation\", \"status\"]\n    name_is_valid = all(word in uploaded_file_name_lower\
          \ for word in keywords)\n\n    if not name_is_valid:\n        msg = get_translated_msg(\"\
          pms_sheet_name\")\n        if msg: errors.append(msg)\n\n    # 6. Final\
          \ Output Logic\n    if errors:\n        return {\n            \"result\"\
          : \"\\n\".join(errors),\n            \"is_valid\": \"false\",\n        \
          \    \"sheet\": sheet,\n            \"columns\": columns,\n            \"\
          preferred_lang\": preferred_lang,\n            \"file_name\": actual_file_name\
          \ # Error case mein bhi name dikhayenge\n        }\n\n    # Success Scenario\n\
          \    if str(file_data.get(\"is_valid\")).lower() == \"true\":\n        return\
          \ {\n            \"result\": get_translated_msg(\"document_received_msg\"\
          ),\n            \"is_valid\": \"true\",\n            \"sheet\": sheet,\n\
          \            \"columns\": columns,\n            \"preferred_lang\": preferred_lang,\n\
          \            \"file_name\": actual_file_name\n        }\n    else:\n   \
          \     api_error = file_data.get(\"error\")\n        return {\n         \
          \   \"result\": api_error if api_error else get_translated_msg(\"error_message_document_received\"\
          ),\n            \"is_valid\": \"false\",\n            \"sheet\": sheet,\n\
          \            \"columns\": columns,\n            \"preferred_lang\": preferred_lang,\n\
          \            \"file_name\": actual_file_name\n        }"
