    - data:
        isInLoop: false
        sourceType: code
        targetType: llm
      id: node-file-classifier-source-node-vision-extractor-target
      source: node-file-classifier
      sourceHandle: source
      target: node-vision-extractor
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInLoop: false
        sourceType: start
        targetType: code
      id: node-start-source-node-file-classifier-target
      source: node-start
      sourceHandle: source
      target: node-file-classifier
      targetHandle: target
      type: custom
      zIndex: 0
