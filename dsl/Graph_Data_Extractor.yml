    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Send image(s) to a multimodal LLM with strict anti-hallucination rules.
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-vision
          role: system
          text: 'ROLE: Chart extraction engine. Output raw JSON only.


            STEP 0 — MANDATORY PRE-SCAN (do this before writing any JSON):

            1. Scan EVERY page of the document from first to last.

            2. Count and list all charts/graphs found. Note page number for each.

            3. Set graphs_found = total count.

            4. Extract ALL of them in order. Do NOT stop early. Do NOT skip any.

            5. If you cannot fit all in one pass, still output ALL graphs — truncate
            data points before truncating graphs.


            CONTRACT (never break):

            - Only output values seen in image. No guessing, no memory, no inference.

            - Each data point read in isolation. Never borrow from neighbour.

            - Confirm x-axis label before writing any value.

            - No pattern extrapolation.

            - Absent point = "MISSING". Present but unreadable = "UNCLEAR". Never
            use 0 or dash as substitute.


            MARKERS:

            - UNCLEAR: point exists but cannot be read

            - MISSING: no point plotted at this position


            VALUE RULES:

            - Printed label → use as-is

            - Visual estimate (no label) → add "_flagged_value": true

            - Cannot estimate → "UNCLEAR"


            PIE: extract % from labels/geometry. Obscured = UNCLEAR. Absent = MISSING.


            BAR/LINE/AREA: read each point against axis independently.


            STACKED BAR (per bar):

            1. Calibrate Y-axis ticks → pixels-per-unit

            2. Confirm x-axis label

            3. Per segment: read bottom edge (start_value), top edge (end_value),
            compute segment_value = end-start

            4. Unreadable edge → all three fields = "UNCLEAR"

            5. Absent segment → all fields = "MISSING"

            NEVER shift segments. NEVER subtract from total.


            WATERFALL — TWO FAILURE MODES:

            F1 LABEL DRIFT: Floating labels appear closer to next bar. Ignore proximity.
            Drop vertical line from label to find owning bar.

            F2 SIGN FROM POSITION: Wrong. Use bar COLOR from legend. Red/grey=decrease(negative).
            Green/blue=increase(positive). Printed label gives MAGNITUDE only — sign
            comes from color.


            WATERFALL STEPS (per bar):

            A. List Y-axis ticks, compute scale

            B. List x-axis labels L→R. For each floating label drop vertical line
            → assign to bar below.

            C. Read bar color → bar_type → sign

            D. Magnitude from aligned label. NEVER calculate residual.

            E. start_value=previous running_total, end_value=start+bar_value

            F. running_total[N]=running_total[N-1]+bar_value[N]

            G. Ambiguous color+no axis → all UNCLEAR. Absent → all MISSING.


            WATERFALL EXAMPLE (correct):

            {"label":"China","bar_type":"decrease","start_value":380,"end_value":373,"bar_value":-7,"running_total":373}


            NO CHARTS:

            {"graphs_found":0,"graphs":[],"no_graph_reason":"No chart or graph detected."}


            PRE-OUTPUT CHECK:

            - graphs_found matches actual count of graphs in output array?

            - Every page scanned? No graph skipped?

            - Every value anchored to visible element?

            - No neighbour borrowing?

            - UNCLEAR only where point exists but unreadable?

            - MISSING only where no point exists?

            - No invented values?

            Fail any check → fix before output.


            OUTPUT FORMAT (JSON only, no markdown, no prose):

            {"value_marker_legend":{"UNCLEAR":"Exists but unreadable","MISSING":"Not
            plotted"},"graphs_found":<int>,"graphs":[{"graph_index":1,"graph_type":"","title":"","page":<int>,"x_axis":{"label":"","unit":"","ticks":[]},"y_axis":{"label":"","unit":"","ticks":[]},"legend":[],"data":[],"source_annotation":"","extraction_notes":""}]}'
        - id: user-vision
          role: user
          text: 'File name(s): {{#node-file-classifier.file_names#}}


            IMPORTANT: Scan every page. Extract EVERY chart and graph present — do
            not stop until all pages are processed. Set graphs_found to the total
            count before writing any graph entry.


            Follow all RULES exactly. Return only JSON.

            '
        selected: false
        title: Vision extractor
        type: llm
        variables:
        - value_selector:
          - node-file-classifier
          - file_names
          variable: file_names
        vision:
          configs:
            detail: high
            variable_selector:
            - node-start
            - input_file
          enabled: true
      height: 132
      id: node-vision-extractor
      position:
        x: 1212.4366655468152
        y: 326.0328050670394
      positionAbsolute:
        x: 1212.4366655468152
        y: 326.0328050670394
      selected: true
      type: custom
      width: 243
    - data:
        context:
          enabled: true
          variable_selector:
          - node-vision-extractor
          - text
        desc: Audit vision JSON for hallucinations, impossible numbers, type errors.
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-checker
          role: system
          text: 'ROLE: Chart JSON auditor. Flag errors. Never fix or invent data.


            CONTRACT:

            - DO NOT change numbers to balance math. Flag discrepancy instead.

            - DO NOT add "Other"/"Adjustment"/"Residual" entries not in source.

            - Report values as-is even if chart has mathematical error.


            GENERAL CHECKS:

            1. Flag round values (100/1000/5000) not matching axis ticks → suspicious_round_values

            2. Pie/Donut % total >102 or <98 → sum_warning

            3. Labels absent from x_axis.ticks → axis_mismatch

            4. Normalize graph_type: Bar Chart|Grouped Bar Chart|Stacked Bar Chart|Column
            Chart|Line Chart|Area Chart|Pie Chart|Donut Chart|Waterfall Chart|Scatter
            Plot|Other


            WATERFALL AUDITS (never change data, only flag):

            a. running_total[N] != start_value[N+1] → waterfall_continuity_warning

            b. start_value+bar_value != end_value → arithmetic_logic_warning: "mismatch
            at [label]"

            c. decrease bar has positive bar_value OR increase bar has negative →
            sign_mismatch_warning

            d. Final total bar != sum of parts → total_discrepancy_warning

            e. abs(bar_value) != printed label (diff >1) → magnitude_sync_warning

            f. Entry exists only to balance math (value=1 or -1) → force_balance_warning


            STACKED BAR AUDITS:

            g. segment start != previous segment end → stack_gap_warning

            h. sum(segment_values) != total bar height → segment_sum_warning


            OUTPUT:

            - Top-level "audit_passed": true/false

            - If false: "audit_failure_reasons": [list]

            - Return ONLY audited JSON. No prose.'
        - id: user-checker
          role: user
          text: 'Audit this vision-extracted graph JSON:


            {{#node-vision-extractor.text#}}

            '
        selected: false
        title: Fact checker / auditor
        type: llm
        variables:
        - value_selector:
