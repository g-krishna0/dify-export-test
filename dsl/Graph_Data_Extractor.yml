            2. Empty/missing graphs → output: > ℹ No charts detected.\n3. Heading:\
            \ ### {title} ({graph_type})\n\n4. Table layout by type:\n- Bar/Column/Line/Area:\
            \ | {x_label} | Value |\n- Pie/Donut: | Category | Value | % |\n- Scatter/Bubble:\
            \ | {x_label} | {y_label} | Label |\n- Heatmap: rows=y, cols=x\n- Waterfall:\
            \ | Label | Bar Type | Start | End | Value | Running Total |\n  Bar Type\
            \ values: increase/decrease/total/subtotal/UNCLEAR\n  Footer row: | **Final\
            \ Total** | total | — | {last_running_total} | — | {last_running_total}\
            \ |\n- Other: best fit\n\n5. Cell values:\n- MISSING → blank cell (no\
            \ dash, no zero)\n- UNCLEAR → exactly \"-\"\n- _flagged_value true → append\
            \ \"†\" (e.g. 1,234†)\n- Never use \"—\", \"N/A\", \"?\", \"unknown\"\n\
            - Never invent missing values\nLegend once at end: > *Blank = not present;\
            \ - = present but unclear*\n\n6. _flagged values → append \"†\"\nFootnote\
            \ once at end: > † May be approximate.\n\n7. Audit warnings → blockquote\
            \ below affected table:\n> ⚠ [warning]\nFor value_shift_warning: > ⚠ DATA\
            \ QUALITY ALERT: Values may be shifted. Verify against source.\n\n8. source_annotation\
            \ → > Source: {text}\n9. Numbers: use comma thousands separator.\n10.\
            \ No fabrication. If value not in JSON, leave blank."
        - id: user-formatter
          role: user
          text: 'Format this audited JSON into markdown tables:


            {{#node-fact-checker.text#}}

            '
        selected: false
        title: Table formatter
        type: llm
        variables:
        - value_selector:
