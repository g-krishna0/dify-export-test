app:
  description: 'Upload any file (PDF, image, DOCX, XLSX, PPTX) containing charts or
    graphs. The workflow detects every graph, extracts the raw data with strict anti-hallucination
    controls, and returns a verified markdown report. No user question is required
    — just drop the file.

    '
  icon: 📊
  icon_background: '#E6F1FB'
  mode: workflow
  name: Graph Data Extractor
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInLoop: false
        sourceType: llm
        targetType: llm
      id: edge-vision-to-checker
      source: node-vision-extractor
      sourceHandle: source
      target: node-fact-checker
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: llm
        targetType: llm
      id: edge-checker-to-formatter
      source: node-fact-checker
      sourceHandle: source
      target: node-table-formatter
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: llm
        targetType: llm
      id: edge-formatter-to-summary
      source: node-table-formatter
      sourceHandle: source
      target: node-summary-writer
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: llm
        targetType: template-transform
      id: edge-summary-to-template
      source: node-summary-writer
      sourceHandle: source
      target: node-output-template
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: template-transform
        targetType: end
      id: edge-template-to-end
      source: node-output-template
      sourceHandle: source
      target: node-end
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: code
        targetType: llm
      id: node-file-classifier-source-node-vision-extractor-target
      source: node-file-classifier
      sourceHandle: source
      target: node-vision-extractor
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInLoop: false
        sourceType: start
        targetType: code
      id: node-start-source-node-file-classifier-target
      source: node-start
      sourceHandle: source
      target: node-file-classifier
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: Workflow entry point. The caller supplies one file. No free-text question
          is required.
        selected: false
        title: Start
        type: start
        variables:
        - allowed_file_extensions: []
          allowed_file_types:
          - image
          - document
          allowed_file_upload_methods:
          - local_file
          label: input_file
          max_length: 5
          options: []
          required: true
          type: file-list
          variable: input_file
      height: 148
      id: node-start
      position:
        x: 569.7005147069693
        y: 421.1352865004432
      positionAbsolute:
        x: 569.7005147069693
        y: 421.1352865004432
      selected: false
      type: custom
      width: 243
    - data:
        code: "import os\n\ndef get_file_name(f) -> str:\n    for attr in (\"filename\"\
          , \"name\"):\n        try:\n            val = getattr(f, attr, None)\n \
          \           if val:\n                return str(val)\n        except Exception:\n\
          \            pass\n    if isinstance(f, dict):\n        return f.get(\"\
          filename\") or f.get(\"name\") or \"\"\n    return \"\"\n\ndef get_mime(f)\
          \ -> str:\n    try:\n        mime = getattr(f, \"mime_type\", None)\n  \
          \      if mime:\n            return str(mime)\n    except Exception:\n \
          \       pass\n    if isinstance(f, dict):\n        return f.get(\"mime_type\"\
          , \"\")\n    return \"\"\n\ndef main(input_files) -> dict:\n    IMAGE_EXTS\
          \    = {\".png\", \".jpg\", \".jpeg\", \".tiff\",\n                    \
          \ \".bmp\", \".webp\", \".gif\"}\n    DOCUMENT_EXTS = {\".pdf\", \".docx\"\
          , \".xlsx\", \".pptx\", \".csv\"}\n\n    if input_files is None:\n     \
          \   files = []\n    elif isinstance(input_files, list):\n        files =\
          \ input_files\n    else:\n        files = [input_files]\n\n    if not files:\n\
          \        return {\n            \"file_type\":   \"unknown\",\n         \
          \   \"is_image\":    \"false\",\n            \"is_document\": \"false\"\
          ,\n            \"file_names\":  \"\",\n        }\n\n    is_image    = False\n\
          \    is_document = False\n    file_names  = []\n\n    for f in files:\n\
          \        name = get_file_name(f)\n        mime = get_mime(f)\n        ext\
          \  = os.path.splitext(name)[1].lower() if name else \"\"\n\n        if ext\
          \ in IMAGE_EXTS or mime.startswith(\"image/\"):\n            is_image =\
          \ True\n            if not name:\n                name = \"image_file\"\n\
          \        elif ext in DOCUMENT_EXTS or mime in (\n            \"application/pdf\"\
          ,\n            \"application/vnd.openxmlformats-officedocument.wordprocessingml.document\"\
          ,\n            \"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\"\
          ,\n            \"application/vnd.openxmlformats-officedocument.presentationml.presentation\"\
          ,\n            \"text/csv\",\n        ):\n            is_document = True\n\
          \            if not name:\n                name = \"document_file\"\n  \
          \      else:\n            is_document = True\n            if not name:\n\
          \                name = \"uploaded_file\"\n\n        file_names.append(name)\n\
          \n    if is_document:\n        file_type = \"document\"\n        is_image\
          \  = False\n    elif is_image:\n        file_type = \"image\"\n    else:\n\
          \        file_type = \"unknown\"\n\n    return {\n        \"file_type\"\
          :   file_type,\n        \"is_image\":    str(is_image).lower(),\n      \
          \  \"is_document\": str(is_document).lower(),\n        \"file_names\": \
          \ \", \".join(file_names),\n    }\n"
        code_language: python3
        desc: Inspect file extension and MIME type. Returns routing flags and file
          names.
        outputs:
          file_names:
            children: null
            type: string
          file_type:
            children: null
            type: string
          is_document:
            children: null
            type: string
          is_image:
            children: null
            type: string
        selected: false
        title: File type classifier
        type: code
        variables:
        - value_selector:
          - node-start
          - input_file
          value_type: array[file]
          variable: input_files
      height: 96
      id: node-file-classifier
      position:
        x: 890.4543562782271
        y: 354.8398831408275
      positionAbsolute:
        x: 890.4543562782271
        y: 354.8398831408275
      selected: false
      type: custom
      width: 243
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Send image(s) to a multimodal LLM with strict anti-hallucination rules.
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-vision
          role: system
          text: "You are a precise chart and graph extraction engine.\n\n════════\
            \ ABSOLUTE ANTI-HALLUCINATION CONTRACT ════════\n\nBEFORE extracting ANY\
            \ value, swear to these rules:\n\n[AH-1] ZERO INVENTION: You may ONLY\
            \ output values that you can directly see or mathematically derive from\
            \ what is visible in the image. You must NEVER invent, guess, recall from\
            \ memory, or infer a value that is not visually anchored in the chart.\n\
            \n[AH-2] NO NEIGHBOUR BORROWING: You must NEVER copy, borrow, shift, or\
            \ inherit a value from a neighbouring bar, adjacent data point, previous\
            \ series entry, or similar-looking element. Every single data point is\
            \ read in isolation from its own position.\n\n[AH-3] LABEL-VALUE LOCKING:\
            \ Before writing any data entry, explicitly confirm: \"Which x-axis label\
            \ does this bar/point sit directly above (or next to)?\" Only assign the\
            \ value to that confirmed label. If you cannot confidently determine the\
            \ owning label, mark the value \"UNCLEAR\" — do NOT assign it to the nearest\
            \ guess.\n\n[AH-4] NO PATTERN EXTRAPOLATION: Do not assume a value because\
            \ it \"fits a pattern\" or \"continues a trend\". Each point is read independently.\n\
            \n[AH-5] MISSING ≠ ZERO: A data point that is absent from the chart is\
            \ NOT zero unless the chart explicitly plots zero. Use \"MISSING\" for\
            \ absent points.\n\n[AH-6] ONLY IMAGE CONTENT: Do not use any outside\
            \ knowledge, training data, or domain expectations about what values \"\
            should\" be.\n\n════════ RULES ════════\n\nRULE 1 — EXTRACT VISUALLY DERIVABLE\
            \ VALUES\nExtract:\n- explicitly printed values (data labels on the chart)\n\
            - values visually derivable from axes, gridlines, bar heights, line positions,\
            \ pie percentages, scatter locations, and legends.\nIf neither is possible,\
            \ use UNCLEAR or MISSING as appropriate.\n\nRULE 2 — APPROXIMATE WHEN\
            \ NECESSARY\nIf a value is estimated visually from chart geometry (no\
            \ printed label), output the numeric estimate and add:\n\"_flagged_value\"\
            : true\nIf you cannot make a reliable estimate, use \"UNCLEAR\" instead\
            \ of guessing.\n\nRULE 3 — ONLY USE IMAGE CONTENT\nDo not use outside\
            \ knowledge. Only use what can reasonably be interpreted from the image.\n\
            \nRULE 4 — UNCLEAR vs MISSING VALUES — STRICT DISTINCTION\nUse exactly\
            \ two markers:\n\n| Situation                                        \
            \                         | Marker    | When to use                  \
            \                         |\n|---------------------------------------------------------------------------|-----------|-------------------------------------------------------|\n\
            | Value exists in chart but cannot be read (blurry, cut off, overlapping)\
            \  | \"UNCLEAR\" | Bar/point is present but its value cannot be measured\
            \ |\n| Value is simply absent — no bar, point, or slice plotted      \
            \            | \"MISSING\" | No data exists at this position in the chart\
            \          |\n\nNEVER use \"UNCLEAR\" for something that is simply absent.\n\
            NEVER use \"MISSING\" for something that is present but illegible.\nNEVER\
            \ use \"0\", \"—\", or any other placeholder instead of these two markers.\n\
            \nInclude this fixed legend once at the top of every JSON output:\n\"\
            value_marker_legend\": {\n  \"UNCLEAR\": \"Data point exists in the chart\
            \ but could not be reliably read from the image.\",\n  \"MISSING\": \"\
            No data point exists at this position in the chart.\"\n}\n\nRULE 5 — PIE\
            \ CHARTS\nIf percentages are visually inferable from slice labels or geometry,\
            \ extract them.\nIf a slice label is obscured or merged with another,\
            \ mark it as \"UNCLEAR\".\nIf a slice has no label at all, mark it as\
            \ \"MISSING\".\n\nRULE 6 — BAR / LINE / AREA CHARTS\nEstimate values using\
            \ axis ticks and gridlines. Each bar or point must be evaluated against\
            \ the axis independently. Do NOT assume a value based on a pattern or\
            \ neighboring value.\n\nRULE 7 — STACKED BAR CHARTS — STRICT INDEPENDENT\
            \ SEGMENT READING\n\nSTEP-BY-STEP EXTRACTION PROCEDURE (follow for every\
            \ bar):\n\nSTEP A — AXIS CALIBRATION: Read all Y-axis tick labels and\
            \ their pixel positions. Compute pixels-per-unit scale.\n\nSTEP B — LABEL\
            \ CONFIRMATION: Identify the exact x-axis label this bar belongs to. Write\
            \ it down before reading any values. Do NOT proceed until the label is\
            \ confirmed.\n\nSTEP C — SEGMENT ISOLATION: For each segment in this bar:\n\
            \  1. Find the segment's bottom pixel edge on the Y-axis scale → this\
            \ is start_value.\n  2. Find the segment's top pixel edge on the Y-axis\
            \ scale → this is end_value.\n  3. Compute segment_value = end_value -\
            \ start_value.\n  4. These three reads are INDEPENDENT — do not carry\
            \ any number from another segment or bar.\n\nSTEP D — UNCLEAR HANDLING:\
            \ If any edge cannot be reliably placed on the Y-axis scale, mark start_value,\
            \ end_value, AND segment_value all as \"UNCLEAR\". Do NOT substitute with\
            \ a value from an adjacent segment.\n\nSTEP E — MISSING HANDLING: If a\
            \ segment does not exist in this bar (not plotted), mark all fields as\
            \ \"MISSING\".\n\nCRITICAL SHIFT-ERROR PREVENTION:\n- NEVER shift a segment's\
            \ value one position up or down in the stack.\n- NEVER assign one segment's\
            \ value to a different segment just because they look similar in size.\n\
            - NEVER derive a segment's value by subtracting other segments from the\
            \ total — always read from the axis directly.\n\nExample of correct stacked\
            \ bar extraction:\n{\n  \"label\": \"Q2\",\n  \"series\": \"Segment B\"\
            ,\n  \"start_value\": 40,\n  \"end_value\": 70,\n  \"segment_value\":\
            \ 30\n}\nIf start or end is not readable:\n{\n  \"label\": \"Q2\",\n \
            \ \"series\": \"Segment B\",\n  \"start_value\": \"UNCLEAR\",\n  \"end_value\"\
            : \"UNCLEAR\",\n  \"segment_value\": \"UNCLEAR\"\n}\n\nRULE 8 — WATERFALL\
            \ CHARTS — STRICT AXIS-BASED READING WITH LABEL LOCKING AND COLOR-BASED\
            \ SIGN DETECTION\n\nWATERFALL CHARTS HAVE TWO COMMON EXTRACTION FAILURE\
            \ MODES — READ THIS FIRST:\n\nFAILURE MODE 1 — FLOATING DATA LABEL MISASSIGNMENT:\n\
            Waterfall charts often print a small data label (e.g. \"7\", \"17\", \"\
            22\") BETWEEN or ABOVE bars.\nThese labels float in space and visually\
            \ appear closer to the NEXT bar than the one they belong to.\nTHE LABEL\
            \ BELONGS TO THE BAR DIRECTLY BELOW IT OR CONNECTED TO IT — NOT the bar\
            \ to its right.\nDo NOT assign a floating label to a bar just because\
            \ it appears spatially closer to that bar.\nThe owning bar is determined\
            \ by vertical alignment — trace the label straight DOWN to find its bar.\n\
            \nFAILURE MODE 2 — SIGN DETERMINED FROM POSITION ALONE (WRONG):\nDo NOT\
            \ determine increase/decrease purely from whether a bar is positioned\
            \ high or low on the chart.\nWaterfall bars float — a bar high on the\
            \ chart can still be a DECREASE.\nInstead, ALWAYS determine bar_type (and\
            \ therefore the sign of bar_value) from:\n  PRIMARY: Bar fill color or\
            \ pattern as defined in the chart legend.\n    - If the legend maps red\
            \ → decrease and grey → decrease, those bars have NEGATIVE bar_values.\n\
            \    - If the legend maps green/blue → increase, those bars have POSITIVE\
            \ bar_values.\n  SECONDARY (if no legend): Whether the bar's top edge\
            \ is HIGHER than its bottom edge starting from the previous running total:\n\
            \    - If the bar hangs DOWN from the previous running total → decrease\
            \ (negative bar_value).\n    - If the bar rises UP from the previous running\
            \ total → increase (positive bar_value).\nNEVER read a printed data label\
            \ (e.g. \"7\") as positive just because it has no minus sign printed.\n\
            The SIGN comes from bar color/direction — the printed label gives only\
            \ the MAGNITUDE.\nSo a bar labeled \"7\" that is colored red (decrease)\
            \ has bar_value = -7, not +7.\n\nSTEP-BY-STEP EXTRACTION PROCEDURE (follow\
            \ for every bar in order):\n\nSTEP A — AXIS CALIBRATION:\n  List every\
            \ visible Y-axis tick and its printed value. Compute the pixel-per-unit\
            \ scale.\n  If no Y-axis is visible, note this in extraction_notes and\
            \ rely on printed data labels for magnitude only.\n\nSTEP B — VERTICAL\
            \ PLUMB-LINE ALIGNMENT:\nList all x-axis labels left to right: [label_1,\
            \ label_2, ...].\nFor every floating data label (e.g., \"7\", \"17\",\
            \ \"22\"), drop a mental vertical line straight down to the chart floor.\n\
            The label belongs ONLY to the bar that this vertical line passes through.\n\
            DO NOT shift labels to the left or right because they look \"closer\"\
            \ to another bar's text. In the provided chart, \"7\" is directly above\
            \ China, \"17\" is directly above Thailand, and \"22\" is directly above\
            \ Canada.\n\nSTEP C — COLOR-BASED BAR TYPE AND SIGN:\n  1. Identify the\
            \ chart's color legend (e.g. red = decrease, green = increase, grey =\
            \ neutral/total).\n  2. For each bar, read its fill color, then assign\
            \ bar_type from the legend:\n     - decrease → bar_value will be NEGATIVE\n\
            \     - increase → bar_value will be POSITIVE\n     - total / subtotal\
            \ → bar_value equals the full cumulative end_value\n  3. If no legend\
            \ exists, infer from bar direction (hanging down = decrease, rising up\
            \ = increase).\n  4. Record bar_type: \"increase\", \"decrease\", \"total\"\
            , \"subtotal\", or \"UNCLEAR\".\n\nSTEP D — LITERAL MAGNITUDE (NO-CALCULATION\
            \ RULE):\nRead the numerical magnitude from the vertically aligned label\
            \ identified in Step B.\nSTRICT PROHIBITION: Do NOT calculate a bar's\
            \ value by subtracting the running total from a target or final total.\n\
            STRICT PROHIBITION: Do NOT invent labels like \"Mathematical Adjustment,\"\
            \ \"Rounding,\" or \"Other\" to force the bars to sum to the final total.\n\
            If a bar has no printed label and cannot be measured via the axis, mark\
            \ it as UNCLEAR.\n\nSTEP E — START AND END VALUES:\n  start_value = running_total\
            \ of the previous bar (i.e. where this bar begins on the Y-axis).\n  end_value\
            \ = start_value + bar_value.\n  For total/subtotal bars: start_value =\
            \ 0 (or baseline), end_value = running_total at that point.\n\nSTEP F\
            \ — REPORTED TOTALS vs. CALCULATED TOTALS:\nExtract the \"Starting Total\"\
            \ and \"Ending Total\" exactly as they are printed on the chart labels.\n\
            If the printed \"Ending Total\" value does not match the mathematical\
            \ sum of the \"Starting Total\" + \"Deltas,\" do NOT change any numbers.\n\
            Simply report the values as seen. The \"Running Total\" field should reflect\
            \ the literal sum of extracted parts, even if it differs from the printed\
            \ final total.\n\nSTEP G — UNCLEAR/MISSING:\n  If bar color is ambiguous\
            \ AND no axis reading is possible → ALL fields \"UNCLEAR\".\n  If bar\
            \ is absent from chart → ALL fields \"MISSING\".\n\nCRITICAL SHIFT-ERROR\
            \ PREVENTION:\n- NEVER carry one bar's end_value as the next bar's printed\
            \ data label value.\n- NEVER assign a floating label to the bar it is\
            \ spatially nearest to — trace vertically to the owning bar.\n- NEVER\
            \ assume a label without a minus sign is positive — use bar color for\
            \ sign.\n- If you find yourself writing the same value for two consecutive\
            \ bars — STOP and re-read both.\n\nReal-world example (matches a known\
            \ extraction failure):\nChart shows: Total(Oct)=383, then bars labeled\
            \ 2, 1, 0, 7, 17, 22, 42, Total(Nov)=382.\nBars are colored: red=decrease\
            \ (or near-zero), grey=decrease.\nCorrect extraction:\n  Brazil: bar_value=-2\
            \ (red, decrease, label \"2\" belongs to Brazil bar)\n  Turkiye: bar_value=-1\
            \ (red, decrease, label \"1\" belongs to Turkiye bar)\n  Australia: bar_value=0\
            \ (label \"0\", no movement)\n  China: bar_value=-7 (grey, decrease, label\
            \ \"7\" belongs to CHINA bar — NOT Thailand)\n  Thailand: bar_value=-17\
            \ (grey, decrease, label \"17\" belongs to THAILAND bar — NOT Canada)\n\
            \  Canada: bar_value=+42 (red/positive, increase, label \"42\" belongs\
            \ to CANADA bar)\n  Others: bar_value=-1 (remaining difference to reach\
            \ 382)\nWRONG extraction (the shift error to avoid):\n  China: bar_value=-17\
            \ ← WRONG, this is Thailand's value\n  Thailand: bar_value=-22 ← WRONG,\
            \ this is Canada's value\n\nExample of correct waterfall JSON entry:\n\
            {\n  \"label\": \"China\",\n  \"bar_type\": \"decrease\",\n  \"start_value\"\
            : 380,\n  \"end_value\": 373,\n  \"bar_value\": -7,\n  \"running_total\"\
            : 373\n}\nIf a bar's values are not readable:\n{\n  \"label\": \"China\"\
            ,\n  \"bar_type\": \"UNCLEAR\",\n  \"start_value\": \"UNCLEAR\",\n  \"\
            end_value\": \"UNCLEAR\",\n  \"bar_value\": \"UNCLEAR\",\n  \"running_total\"\
            : \"UNCLEAR\"\n}\n\nRULE 9 — EMPTY CASE\nIf no charts exist:\n{\n  \"\
            graphs_found\": 0,\n  \"graphs\": [],\n  \"no_graph_reason\": \"No chart\
            \ or graph detected.\"\n}\n\nRULE 10 — OUTPUT ONLY JSON\nNo markdown.\
            \ No prose. No explanations. Output raw JSON only.\n\n════════ SELF-CHECK\
            \ BEFORE OUTPUT ════════\nBefore writing the final JSON, verify:\n[ ]\
            \ Every bar/point value is anchored to a specific visible element in the\
            \ image.\n[ ] No value was borrowed from a neighbour.\n[ ] Every label-value\
            \ pair was confirmed by label-locking (Step B).\n[ ] UNCLEAR is used only\
            \ where a data point EXISTS but is illegible.\n[ ] MISSING is used only\
            \ where no data point exists.\n[ ] No invented or recalled values are\
            \ present.\nIf any check fails, re-read the affected bars from the axis\
            \ before outputting.\n\n════════ OUTPUT FORMAT ════════\n\n{\n  \"value_marker_legend\"\
            : {\n    \"UNCLEAR\": \"Data point exists in the chart but could not be\
            \ reliably read from the image.\",\n    \"MISSING\": \"No data point exists\
            \ at this position in the chart.\"\n  },\n  \"graphs_found\": <integer>,\n\
            \  \"graphs\": [\n    {\n      \"graph_index\": 1,\n      \"graph_type\"\
            : \"\",\n      \"title\": \"\",\n      \"x_axis\": {\n        \"label\"\
            : \"\",\n        \"unit\": \"\",\n        \"ticks\": []\n      },\n  \
            \    \"y_axis\": {\n        \"label\": \"\",\n        \"unit\": \"\",\n\
            \        \"ticks\": []\n      },\n      \"legend\": [],\n      \"data\"\
            : [],\n      \"source_annotation\": \"\",\n      \"extraction_notes\"\
            : \"\"\n    }\n  ]\n}"
        - id: user-vision
          role: user
          text: 'File name(s): {{#node-file-classifier.file_names#}}


            Extract all charts and graphs from the image(s) above.

            Follow all RULES exactly. Return only JSON.

            '
        selected: false
        title: Vision extractor
        type: llm
        variables:
        - value_selector:
          - node-file-classifier
          - file_names
          variable: file_names
        vision:
          configs:
            detail: high
            variable_selector:
            - node-start
            - input_file
          enabled: true
      height: 132
      id: node-vision-extractor
      position:
        x: 1212.4366655468152
        y: 326.0328050670394
      positionAbsolute:
        x: 1212.4366655468152
        y: 326.0328050670394
      selected: true
      type: custom
      width: 243
    - data:
        context:
          enabled: true
          variable_selector:
          - node-vision-extractor
          - text
        desc: Audit vision JSON for hallucinations, impossible numbers, type errors.
        model:
          completion_params:
            temperature: 0
            top_p: 0
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-checker
          role: system
          text: "You are a strict data auditor for chart extraction results. Your\
            \ job is to identify internal inconsistencies and potential transcription\
            \ errors WITHOUT inventing or \"fixing\" data. \n\n════════ STICK-TO-DOCUMENT\
            \ CONTRACT ════════\n[RULE 1] DO NOT CORRECT MATH: If the sum of the parts\
            \ does not equal the total, DO NOT change the numbers to make them \"\
            right.\" Instead, set \"audit_passed\": false and flag the discrepancy.\n\
            [RULE 2] NO MAGICAL ADJUSTMENTS: Never create \"Other,\" \"Adjustment,\"\
            \ or \"Residual\" entries to balance a waterfall chart if they are not\
            \ in the source JSON.\n[RULE 3] TRANSCRIPTION FIDELITY: Your primary goal\
            \ is to ensure the extracted values represent what is actually written\
            \ in the image, even if the image contains a mathematical error.\n\n════════\
            \ GENERAL AUDITS ════════\n1. sospicious_round_values: Flag values like\
            \ 100, 1000, 5000 if they don't match axis ticks.\n2. sum_warning: For\
            \ Pie/Donut charts, if % totals are >102 or <98, add \"sum_warning\".\n\
            3. axis_mismatch: If extracted labels are not present in the x_axis ticks/labels,\
            \ flag it.\n4. Normalise graph_type: Ensure names match: Bar Chart, Grouped\
            \ Bar Chart, Stacked Bar Chart, Column Chart, Line Chart, Area Chart,\
            \ Pie Chart, Donut Chart, Waterfall Chart, Scatter Plot, Other.\n\n════════\
            \ WATERFALL CHART AUDITS (CRITICAL) ════════\nPerform these checks for\
            \ every Waterfall Chart. If any check fails, do NOT change the data; simply\
            \ add the warning and set \"audit_passed\": false.\n\na. CONTINUITY CHECK:\
            \ Verify running_total[N] == start_value[N+1]. If not, add \"waterfall_continuity_warning\"\
            .\nb. ARITHMETIC LOGIC: Check if (start_value + bar_value) == end_value.\
            \ If they don't match, add \"arithmetic_logic_warning\": \"Calculation\
            \ mismatch at [label]\". Do NOT \"fix\" the numbers.\nc. SIGN-TYPE MISMATCH:\
            \ Check if bar_type=\"decrease\" has a negative bar_value and \"increase\"\
            \ has a positive bar_value. If not, add \"sign_mismatch_warning\".\nd.\
            \ TOTAL VALIDATION: Check if the final \"Total\" bar equals the sum of\
            \ the preceding parts. If not, add \"total_discrepancy_warning\": \"The\
            \ chart's reported total differs from the sum of its labeled parts.\"\n\
            e. MAGNITUDE SYNC: Compare abs(bar_value) against any extracted printed\
            \ labels. If they differ by >1 unit, add \"magnitude_sync_warning\".\n\
            f. FORCE-BALANCE DETECTION: Look for entries with very small values (e.g.,\
            \ 1 or -1) that seem to exist only to balance the math. If found, add\
            \ \"force_balance_warning\".\n\n════════ STACKED BAR AUDITS ════════\n\
            g. STACK CONTINUITY: Ensure each segment's start_value equals the previous\
            \ segment's end_value. If not, add \"stack_gap_warning\".\nh. SEGMENT\
            \ SUM: Verify that the sum of segment_values equals the reported total\
            \ height of the bar. If not, add \"segment_sum_warning\".\n\n════════\
            \ OUTPUT REQUIREMENTS ════════\n- Include top-level \"audit_passed\":\
            \ true/false.\n- If false, include \"audit_failure_reasons\": [list of\
            \ warnings].\n- Return ONLY the audited JSON. No prose. No explanations."
