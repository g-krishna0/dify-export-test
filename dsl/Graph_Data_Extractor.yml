      source: node-summary-writer
      sourceHandle: source
      target: node-output-template
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: template-transform
        targetType: end
      id: edge-template-to-end
      source: node-output-template
      sourceHandle: source
      target: node-end
      targetHandle: target
