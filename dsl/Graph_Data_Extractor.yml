          domain expectations about what values \"should\" be.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"════════
          RULES ════════","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          1 — EXTRACT VISUALLY DERIVABLE VALUES","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Extract:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          explicitly printed values (data labels on the chart)","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          values visually derivable from axes, gridlines, bar heights, line positions,
          pie percentages, scatter locations, and legends.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          neither is possible, use UNCLEAR or MISSING as appropriate.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          2 — APPROXIMATE WHEN NECESSARY","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          a value is estimated visually from chart geometry (no printed label), output
          the numeric estimate and add:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"\"_flagged_value\":
          true","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          you cannot make a reliable estimate, use \"UNCLEAR\" instead of guessing.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          3 — ONLY USE IMAGE CONTENT","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Do
          not use outside knowledge. Only use what can reasonably be interpreted from
          the image.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          4 — UNCLEAR vs MISSING VALUES — STRICT DISTINCTION","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Use
          exactly two markers:","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"|
          Situation                                                                 |
          Marker    | When to use                                           |","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"|---------------------------------------------------------------------------|-----------|-------------------------------------------------------|","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"|
          Value exists in chart but cannot be read (blurry, cut off, overlapping)  |
          \"UNCLEAR\" | Bar/point is present but its value cannot be measured |","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"|
          Value is simply absent — no bar, point, or slice plotted                  |
          \"MISSING\" | No data exists at this position in the chart          |","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"NEVER
          use \"UNCLEAR\" for something that is simply absent.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"NEVER
          use \"MISSING\" for something that is present but illegible.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"NEVER
          use \"0\", \"—\", or any other placeholder instead of these two markers.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Include
          this fixed legend once at the top of every JSON output:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"\"value_marker_legend\":
          {","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"UNCLEAR\":
          \"Data point exists in the chart but could not be reliably read from the
          image.\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"MISSING\":
          \"No data point exists at this position in the chart.\"","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"}","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          5 — PIE CHARTS","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          percentages are visually inferable from slice labels or geometry, extract
          them.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          a slice label is obscured or merged with another, mark it as \"UNCLEAR\".","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          a slice has no label at all, mark it as \"MISSING\".","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          6 — BAR / LINE / AREA CHARTS","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Estimate
          values using axis ticks and gridlines. Each bar or point must be evaluated
          against the axis independently. Do NOT assume a value based on a pattern
          or neighboring value.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          7 — STACKED BAR CHARTS — STRICT INDEPENDENT SEGMENT READING","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP-BY-STEP
          EXTRACTION PROCEDURE (follow for every bar):","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          A — AXIS CALIBRATION: Read all Y-axis tick labels and their pixel positions.
          Compute pixels-per-unit scale.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          B — LABEL CONFIRMATION: Identify the exact x-axis label this bar belongs
          to. Write it down before reading any values. Do NOT proceed until the label
          is confirmed.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          C — SEGMENT ISOLATION: For each segment in this bar:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  1.
          Find the segment''s bottom pixel edge on the Y-axis scale → this is start_value.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  2.
          Find the segment''s top pixel edge on the Y-axis scale → this is end_value.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  3.
          Compute segment_value = end_value - start_value.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  4.
          These three reads are INDEPENDENT — do not carry any number from another
          segment or bar.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          D — UNCLEAR HANDLING: If any edge cannot be reliably placed on the Y-axis
          scale, mark start_value, end_value, AND segment_value all as \"UNCLEAR\".
          Do NOT substitute with a value from an adjacent segment.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          E — MISSING HANDLING: If a segment does not exist in this bar (not plotted),
          mark all fields as \"MISSING\".","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"CRITICAL
          SHIFT-ERROR PREVENTION:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER shift a segment''s value one position up or down in the stack.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER assign one segment''s value to a different segment just because they
          look similar in size.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER derive a segment''s value by subtracting other segments from the total
          — always read from the axis directly.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Example
          of correct stacked bar extraction:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"{","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"label\":
          \"Q2\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"series\":
          \"Segment B\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"start_value\":
          40,","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"end_value\":
          70,","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"segment_value\":
          30","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"}","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"If
          start or end is not readable:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"{","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"label\":
          \"Q2\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"series\":
          \"Segment B\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"start_value\":
          \"UNCLEAR\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"end_value\":
          \"UNCLEAR\",","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  \"segment_value\":
          \"UNCLEAR\"","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"}","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"RULE
          8 — WATERFALL CHARTS — STRICT AXIS-BASED READING WITH LABEL LOCKING AND
          COLOR-BASED SIGN DETECTION","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"WATERFALL
          CHARTS HAVE TWO COMMON EXTRACTION FAILURE MODES — READ THIS FIRST:","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"FAILURE
          MODE 1 — FLOATING DATA LABEL MISASSIGNMENT:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Waterfall
          charts often print a small data label (e.g. \"7\", \"17\", \"22\") BETWEEN
          or ABOVE bars.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"These
          labels float in space and visually appear closer to the NEXT bar than the
          one they belong to.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"THE
          LABEL BELONGS TO THE BAR DIRECTLY BELOW IT OR CONNECTED TO IT — NOT the
          bar to its right.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Do
          NOT assign a floating label to a bar just because it appears spatially closer
          to that bar.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"The
          owning bar is determined by vertical alignment — trace the label straight
          DOWN to find its bar.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"FAILURE
          MODE 2 — SIGN DETERMINED FROM POSITION ALONE (WRONG):","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Do
          NOT determine increase/decrease purely from whether a bar is positioned
          high or low on the chart.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Waterfall
          bars float — a bar high on the chart can still be a DECREASE.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Instead,
          ALWAYS determine bar_type (and therefore the sign of bar_value) from:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  PRIMARY:
          Bar fill color or pattern as defined in the chart legend.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    -
          If the legend maps red → decrease and grey → decrease, those bars have NEGATIVE
          bar_values.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    -
          If the legend maps green/blue → increase, those bars have POSITIVE bar_values.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  SECONDARY
          (if no legend): Whether the bar''s top edge is HIGHER than its bottom edge
          starting from the previous running total:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    -
          If the bar hangs DOWN from the previous running total → decrease (negative
          bar_value).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    -
          If the bar rises UP from the previous running total → increase (positive
          bar_value).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"NEVER
          read a printed data label (e.g. \"7\") as positive just because it has no
          minus sign printed.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"The
          SIGN comes from bar color/direction — the printed label gives only the MAGNITUDE.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"So
          a bar labeled \"7\" that is colored red (decrease) has bar_value = -7, not
          +7.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP-BY-STEP
          EXTRACTION PROCEDURE (follow for every bar in order):","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          A — AXIS CALIBRATION:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  List
          every visible Y-axis tick and its printed value. Compute the pixel-per-unit
          scale.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  If
          no Y-axis is visible, note this in extraction_notes and rely on printed
          data labels for magnitude only.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          B — LABEL LOCKING (do this FIRST, before reading any value):","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  1.
          List all x-axis labels left to right: [label_1, label_2, label_3, ...]","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  2.
          List all visible bars left to right in the same order.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  3.
          Pair them: bar_1 → label_1, bar_2 → label_2, etc.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  4.
          For any floating data label near a bar: trace it VERTICALLY DOWNWARD to
          find which bar it sits above. Assign it to THAT bar.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  5.
          Do NOT shift: if label_N''s data label appears slightly to the right, it
          still belongs to bar_N.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  6.
          If pairing is ambiguous, mark that bar''s fields as \"UNCLEAR\".","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          C — COLOR-BASED BAR TYPE AND SIGN:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  1.
          Identify the chart''s color legend (e.g. red = decrease, green = increase,
          grey = neutral/total).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  2.
          For each bar, read its fill color, then assign bar_type from the legend:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"     -
          decrease → bar_value will be NEGATIVE","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"     -
          increase → bar_value will be POSITIVE","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"     -
          total / subtotal → bar_value equals the full cumulative end_value","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  3.
          If no legend exists, infer from bar direction (hanging down = decrease,
          rising up = increase).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  4.
          Record bar_type: \"increase\", \"decrease\", \"total\", \"subtotal\", or
          \"UNCLEAR\".","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          D — MAGNITUDE READING:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  Option
          A (printed data label visible): Use the printed number as the MAGNITUDE.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    Then
          apply the sign from Step C: bar_value = magnitude × (−1 if decrease, +1
          if increase).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  Option
          B (no printed label): Measure bar height from Y-axis scale.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    start_value
          = lower edge mapped to Y-axis. end_value = upper edge mapped to Y-axis.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"    bar_value
          = end_value − start_value (sign already encoded by direction).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  NEVER
          apply the sign from whether the number looks positive or negative visually.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  NEVER
          assume a printed unsigned number (e.g. \"7\") is positive — sign comes from
          Step C.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          E — START AND END VALUES:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  start_value
          = running_total of the previous bar (i.e. where this bar begins on the Y-axis).","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  end_value
          = start_value + bar_value.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  For
          total/subtotal bars: start_value = 0 (or baseline), end_value = running_total
          at that point.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          F — RUNNING TOTAL:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  running_total[N]
          = running_total[N−1] + bar_value[N].","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  First
          bar (total/opening): running_total = end_value.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"STEP
          G — UNCLEAR/MISSING:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  If
          bar color is ambiguous AND no axis reading is possible → ALL fields \"UNCLEAR\".","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  If
          bar is absent from chart → ALL fields \"MISSING\".","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"CRITICAL
          SHIFT-ERROR PREVENTION:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER carry one bar''s end_value as the next bar''s printed data label value.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER assign a floating label to the bar it is spatially nearest to — trace
          vertically to the owning bar.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          NEVER assume a label without a minus sign is positive — use bar color for
          sign.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"-
          If you find yourself writing the same value for two consecutive bars — STOP
          and re-read both.","type":"text","version":1},{"type":"linebreak","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Real-world
          example (matches a known extraction failure):","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Chart
          shows: Total(Oct)=383, then bars labeled 2, 1, 0, 7, 17, 22, 42, Total(Nov)=382.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Bars
          are colored: red=decrease (or near-zero), grey=decrease.","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"Correct
          extraction:","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  Brazil:
          bar_value=-2 (red, decrease, label \"2\" belongs to Brazil bar)","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  Turkiye:
          bar_value=-1 (red, decrease, label \"1\" belongs to Turkiye bar)","type":"text","version":1},{"type":"linebreak","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"  Australia:
