    - data:
        code: "import json\n\ndef main(itinerary_text: str) -> dict:\n    data = json.loads(itinerary_text)\n\
          \    markdown = data[\"itinerary_markdown\"]\n    \n    legs = json.loads(data[\"\
          city_legs\"])\n    \n    legs_md = \"\\n\\n---\\n\\n## ✈️ Flight Plan\\\
          n\\n\"\n    for leg in legs:\n        if leg[\"leg_type\"] == \"flight\"\
          :\n            emoji = \"\U0001F6EB\"\n            label = \"Outbound Flight\"\
          \n        elif leg[\"leg_type\"] == \"return_flight\":\n            emoji\
          \ = \"\U0001F6EC\"\n            label = \"Return Flight\"\n        else:\n\
          \            emoji = \"✈️\"\n            label = \"Flight\"\n        \n\
          \        city_country = leg[\"city_country\"] if leg[\"city_country\"] else\
          \ \"N/A\"\n        nights = leg[\"nights\"]\n        transit_mode = leg[\"\
          transit_mode\"].capitalize()\n        transit_cost = f\"${leg['transit_cost_usd']}\"\
          \ if leg[\"transit_cost_usd\"] == 0 else f\"${leg['transit_cost_usd']} USD\"\
          \n        \n        legs_md += f\"{emoji} **{label}: {leg['from']} → {leg['to']}**\\\
          n\"\n        legs_md += f\"- \U0001F30D City/Country: {city_country}\\n\"\
          \n        legs_md += f\"- \U0001F319 Nights: {nights}\\n\"\n        legs_md\
          \ += f\"- \U0001F68C Transit Mode: {transit_mode}\\n\"\n        legs_md\
          \ += f\"- \U0001F4B0 Transit Cost: {transit_cost}\\n\\n\"\n    \n    result\
          \ = markdown + legs_md\n    return {\"result\": result}"
        code_language: python3
        desc: ''
