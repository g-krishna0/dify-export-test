    - data:
        code: "import json\n\ndef main(logistics_text: str, visa_text: str, experience_text:\
          \ str) -> dict:\n\n    # ─────────────────────────────────────────\n   \
          \ # 1. EXPERIENCE ORCHESTRATOR\n    # ─────────────────────────────────────────\n\
          \    try:\n        exp_data = json.loads(experience_text)\n\n        experience_md\
          \ = \"\"\n\n        known_fields = [\n            'narrative_response',\
          \ 'narrative', 'response',\n            'experience', 'content', 'text',\
          \ 'output', 'result'\n        ]\n\n        for field in known_fields:\n\
          \            if exp_data.get(field):\n                experience_md = exp_data[field]\n\
          \                break\n\n        if not experience_md:\n            for\
          \ key, value in exp_data.items():\n                if isinstance(value,\
          \ str) and len(value) > 50:\n                    experience_md = value\n\
          \                    break\n\n        if not experience_md:\n          \
          \  experience_md = \"No experience data available.\"\n\n    except Exception\
          \ as e:\n        experience_md = f\"Error parsing experience data: {str(e)}\"\
          \n\n    # ─────────────────────────────────────────\n    # 2. VISA & COMPLIANCE\n\
          \    # ─────────────────────────────────────────\n    try:\n        visa_outer\
          \ = json.loads(visa_text)\n        compliance_data = json.loads(visa_outer[\"\
          compliance_json\"])\n\n        visa_md = \"## Visa & Compliance\\n\\n\"\n\
          \n        destination = compliance_data.get('destination') or compliance_data.get('country')\
          \ or compliance_data.get('to') or 'N/A'\n        nationality = compliance_data.get('nationality')\
          \ or compliance_data.get('passport') or 'N/A'\n        overall_risk = compliance_data.get('overall_risk')\
          \ or compliance_data.get('risk') or 'N/A'\n\n        visa_md += f\"**Destination:**\
          \ {destination}\\n\"\n        visa_md += f\"**Nationality:** {nationality}\\\
          n\"\n        visa_md += f\"**Overall Risk:** {overall_risk.replace('_',\
          \ ' ').title()}\\n\\n\"\n\n        visa = compliance_data.get('visa') or\
          \ compliance_data.get('visa_info') or {}\n        if visa:\n           \
          \ visa_md += \"### Visa Requirements\\n\\n\"\n            friendly_visa\
          \ = {\n                \"requirement\": \"Visa Type\",\n               \
          \ \"duration_days\": \"Maximum Stay (Days)\",\n                \"notes\"\
          : \"Details\",\n                \"type\": \"Visa Type\",\n             \
          \   \"cost\": \"Visa Cost\",\n                \"processing_time\": \"Processing\
          \ Time\",\n                \"apply_at\": \"Apply At\",\n               \
          \ \"validity\": \"Validity\",\n            }\n            for key, value\
          \ in visa.items():\n                if value is None or value == \"\" or\
          \ value == []:\n                    continue\n                label = friendly_visa.get(key,\
          \ key.replace(\"_\", \" \").title())\n                if isinstance(value,\
          \ list):\n                    visa_md += f\"- **{label}:**\\n\"\n      \
          \              for item in value:\n                        visa_md += f\"\
          \  - {item}\\n\"\n                else:\n                    display = str(value).replace('_',\
          \ ' ').title() if key == 'requirement' else value\n                    visa_md\
          \ += f\"- **{label}:** {display}\\n\"\n            visa_md += \"\\n\"\n\n\
          \        health = compliance_data.get('health') or compliance_data.get('health_info')\
          \ or {}\n        if health:\n            visa_md += \"### Health & Safety\\\
          n\\n\"\n            friendly_health = {\n                \"advisory_level\"\
          : \"Advisory Level\",\n                \"required_vaccinations\": \"Required\
          \ Vaccinations\",\n                \"recommended_vaccinations\": \"Recommended\
          \ Vaccinations\",\n                \"health_notes\": \"Health Notes\",\n\
          \                \"emergency_number\": \"Emergency Number\",\n         \
          \   }\n            for key, value in health.items():\n                if\
          \ value is None or value == \"\" or value == []:\n                    continue\n\
          \                label = friendly_health.get(key, key.replace(\"_\", \"\
          \ \").title())\n                if isinstance(value, list):\n          \
          \          visa_md += f\"- **{label}:**\\n\"\n                    for item\
          \ in value:\n                        visa_md += f\"  - {item}\\n\"\n   \
          \             else:\n                    if key == \"advisory_level\":\n\
          \                        value = value.replace(\"_\", \" \").title()\n \
          \                   visa_md += f\"- **{label}:** {value}\\n\"\n        \
          \    visa_md += \"\\n\"\n\n        checklist = (\n            compliance_data.get('action_checklist')\
          \ or\n            compliance_data.get('checklist') or\n            compliance_data.get('actions')\
          \ or []\n        )\n        if checklist:\n            visa_md += \"###\
          \ Action Checklist\\n\\n\"\n            for item in checklist:\n       \
          \         visa_md += f\"- {item}\\n\"\n            visa_md += \"\\n\"\n\n\
          \        handled_keys = {\n            'destination', 'nationality', 'overall_risk',\
          \ 'risk', 'country', 'to',\n            'passport', 'visa', 'visa_info',\
          \ 'health', 'health_info',\n            'action_checklist', 'checklist',\
          \ 'actions'\n        }\n        extras = {k: v for k, v in compliance_data.items()\
          \ if k not in handled_keys and v}\n        if extras:\n            visa_md\
          \ += \"### Additional Information\\n\\n\"\n            for key, value in\
          \ extras.items():\n                label = key.replace(\"_\", \" \").title()\n\
          \                if isinstance(value, list):\n                    visa_md\
          \ += f\"- **{label}:**\\n\"\n                    for item in value:\n  \
          \                      visa_md += f\"  - {item}\\n\"\n                elif\
          \ isinstance(value, dict):\n                    visa_md += f\"**{label}:**\\\
          n\"\n                    for k, v in value.items():\n                  \
          \      if v:\n                            visa_md += f\"- {k.replace('_',\
          \ ' ').title()}: {v}\\n\"\n                else:\n                    visa_md\
          \ += f\"- **{label}:** {value}\\n\"\n\n    except Exception as e:\n    \
          \    visa_md = f\"Error parsing visa data: {str(e)}\"\n\n    # ─────────────────────────────────────────\n\
          \    # 3. LOGISTICS & COST\n    # ─────────────────────────────────────────\n\
          \    try:\n        logistics_outer = json.loads(logistics_text)\n      \
          \  cost_data = json.loads(logistics_outer[\"cost_json\"])\n        costs\
          \ = cost_data.get(\"costs\", {})\n\n        logistics_md = \"## Logistics\
          \ & Cost\\n\\n\"\n\n        origin = cost_data.get('origin') or cost_data.get('from')\
          \ or 'N/A'\n        destination_l = cost_data.get('destination') or cost_data.get('to')\
          \ or 'N/A'\n        duration = cost_data.get('duration_days') or cost_data.get('duration')\
          \ or 'N/A'\n\n        logistics_md += f\"**Route:** {str(origin).title()}\
          \ to {str(destination_l).title()}\\n\"\n        logistics_md += f\"**Duration:**\
          \ {duration} day(s)\\n\\n\"\n\n        if costs:\n            logistics_md\
          \ += \"### Cost Breakdown\\n\\n\"\n            friendly_costs = {\n    \
          \            \"flight_usd\": \"Flight Cost (USD)\",\n                \"\
          flight\": \"Flight Cost\",\n                \"airline\": \"Airline\",\n\
          \                \"flight_data_source\": \"Flight Data Source\",\n     \
          \           \"daily_living_usd\": \"Daily Living Cost (USD)\",\n       \
          \         \"daily_living\": \"Daily Living Cost\",\n                \"total_living_usd\"\
          : \"Total Living Cost (USD)\",\n                \"total_living\": \"Total\
          \ Living Cost\",\n                \"total_usd\": \"Total Cost (USD)\",\n\
          \                \"total\": \"Total Cost\",\n                \"local_currency\"\
          : \"Local Currency\",\n                \"dest_currency\": \"Destination\
          \ Currency\",\n                \"source_currency\": \"Source Currency\"\
          ,\n                \"fx_rate_usd_to_local\": \"Exchange Rate (USD to Local)\"\
          ,\n                \"fx_rate_dest_to_source\": \"Exchange Rate (Dest to\
          \ Source)\",\n                \"total_local_currency\": \"Total in Local\
          \ Currency\",\n                \"total_source\": \"Total in Source Currency\"\
          ,\n                \"usd_rate_used\": \"USD Rate Used\",\n             \
          \   \"exchange_rate_source\": \"Exchange Rate Source\",\n              \
          \  \"flight_source\": \"Flight Cost (Source Currency)\",\n             \
          \   \"daily_living_source\": \"Daily Living (Source Currency)\",\n     \
          \           \"total_living_source\": \"Total Living (Source Currency)\"\
          ,\n            }\n            for key, value in costs.items():\n       \
          \         if value is None:\n                    continue\n            \
          \    label = friendly_costs.get(key, key.replace(\"_\", \" \").title())\n\
          \                logistics_md += f\"- **{label}:** {value}\\n\"\n      \
          \      logistics_md += \"\\n\"\n\n        transit_list = cost_data.get(\"\
          transit_summary\", [])\n        if transit_list:\n            logistics_md\
          \ += \"### Transit Guide\\n\\n\"\n            for t in transit_list:\n \
          \               content = t.get(\"content\", \"\")\n                if content:\n\
          \                    parts = {}\n                    for p in content.split(\"\
          ;\"):\n                        if \": \" in p:\n                       \
          \     key, _, value = p.partition(\": \")\n                            parts[key.strip()]\
          \ = value.strip()\n                    for key, value in parts.items():\n\
          \                        label = key.replace(\"_\", \" \").title()\n   \
          \                     logistics_md += f\"- **{label}:** {value}\\n\"\n \
          \                   logistics_md += \"\\n\"\n\n                meta = t.get(\"\
          metadata\", {})\n                doc_meta = meta.get(\"doc_metadata\", {})\n\
          \                for key, value in doc_meta.items():\n                 \
          \   if value and key not in [\"language\", \"document_type\", \"tags\"]:\n\
          \                        label = key.replace(\"_\", \" \").title()\n   \
          \                     logistics_md += f\"- **{label}:** {value}\\n\"\n \
          \               logistics_md += \"\\n\"\n\n        budget_note = cost_data.get(\"\
          budget_note\") or cost_data.get(\"note\") or \"\"\n        if budget_note:\n\
          \            logistics_md += f\"**Note:** {budget_note}\\n\"\n\n    except\
          \ Exception as e:\n        logistics_md = f\"Error parsing logistics data:\
          \ {str(e)}\"\n\n    # ─────────────────────────────────────────\n    # RETURN\
          \ ALL THREE OUTPUTS\n    # ─────────────────────────────────────────\n \
          \   return {\n        \"experience_result\": experience_md,\n        \"\
          visa_result\": visa_md,\n        \"logistics_result\": logistics_md\n  \
          \  }"
        code_language: python3
        desc: ''
