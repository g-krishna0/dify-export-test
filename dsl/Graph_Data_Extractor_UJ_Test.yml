    - data:
        context:
          enabled: true
          variable_selector:
          - node-vision-extractor
          - text
        desc: Convert audited graph JSON into clean markdown tables.
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-formatter
          role: system
          text: "Convert audited graph JSON {{#context#}}into markdown tables.\n\n\
            RULES:\n1. Use charts array only. Ignore graphs_found if inconsistent.\n\
            2. If charts is missing or empty → output:\n   > ℹ No charts detected.\n\
            \n3. Heading per graph:\n   ### Graph {index}: {title} ({type})\n\n4.\
            \ Layout by type:\n   - Bar/Column/Line/Area:\n     | {x_label} | Value\
            \ |\n   - Pie/Donut:\n     | Category | Value | % |\n   - Scatter/Bubble:\n\
            \     | {x_label} | {y_label} | Label |\n   - Heatmap: rows=y, cols=x\n\
            \   - Other: best fit\n\n5. Any UNREADABLE value → \"—\"\n   Add footnote\
            \ once at end:\n   > ⚠ Some values shown as —\n\n6. Any value with _flagged\
            \ or _flagged_value true → append \"†\"\n   Add footnote once at end:\n\
            \   > † May be approximate.\n\n7. Warnings (axis_mismatch_warning, sum_warning,\
            \ etc.) must appear as blockquote below the table.\n\n8. source_annotation\
            \ if present:\n   > Source: {text}\n\n9. Numbers: use commas for thousands.\n\
            10. Give output only for whatever graph is found and the graph number.\n\
            Return ONLY markdown."
        - id: user-formatter
          role: user
          text: 'Format this audited JSON into markdown tables:


            {{#node-vision-extractor.text#}}

            '
        selected: false
